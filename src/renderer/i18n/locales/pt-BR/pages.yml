  article:
    unlockTitle: Compre uma vez e desbloqueie para sempre
    unlockLead: O DLC TurboEngine reúne alta concorrência de propostas, personalização de marca, temas ampliados e recursos de avatar em um único pacote permanente. Depois da compra, não há assinatura, e os recursos passam a valer diretamente para a sua bancada atual.
    featuresTitle: Principais desbloqueios
    purchaseNoticeTitle: Avisos de compra
    purchaseNoticeItems:
      channel: As licenças não são compartilhadas entre diferentes canais de venda. Por exemplo, uma licença comprada na Microsoft Store só funciona com a edição da Microsoft Store.
      restart: Depois da compra, a licença pode não entrar em vigor imediatamente. Tente reiniciar o serviço do Hagicode e o Desktop; se necessário, reinicie também o computador.
      online: Esta licença não oferece suporte a uso offline. Verifique se o computador está com conexão de rede funcionando quando o Desktop iniciar.
    features:
      proposalConcurrency:
        title: O limite de concorrência de propostas sobe de 3 para 32
        description: Esta continua sendo a atualização mais central e mais perceptível do DLC TurboEngine. Propostas em geração, execução e arquivamento compartilham os mesmos slots de concorrência, então o teto mais alto muda diretamente se você consegue manter várias frentes de trabalho em paralelo com estabilidade.
      documentThemes:
        title: Temas de documento ampliados
        description: Nas telas de gerenciamento de agentes, você pode alternar entre opções ampliadas de Document Theme e visualizar em tempo real como a bancada, o histórico e os agrupamentos de fallback ficam com outra terminologia e outros textos.
      composeCommitCoAuthor:
        title: Co-Authored-By personalizado para AI Compose Commit
        description: Nas configurações do Git, você pode salvar um modo padrão de Co-Authored-By. Em uma execução específica do AI Compose, também é possível trocar temporariamente por um colaborador personalizado com nome e e-mail, ou não adicionar esse rodapé naquela rodada.
      branding:
        title: Personalização de marca
        description: Quando o DLC TurboEngine está ativo, você pode enviar um logotipo para o cabeçalho e configurar o título do app, o título do navegador e o link da marca. Não é só trocar o ícone no canto superior esquerdo, mas liberar toda a área de marca do cabeçalho da bancada para personalização.
      avatarUpload:
        title: Envio de avatar personalizado e reaproveitamento compartilhado
        description: Agora você pode enviar um avatar personalizado para o agente atual, e a biblioteca compartilhada de avatares personalizados também pode ser reutilizada nos fluxos de criação, edição e criação em lote.
      avatarPacks:
        title: Mais recursos de avatar
        description: Cinco novos conjuntos internos de avatares de agente estão incluídos.
