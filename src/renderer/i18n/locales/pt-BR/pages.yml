      saveSuccess: Configurações de atualização em segundo plano salvas
      saveFailed: Falha ao salvar as configurações de atualização em segundo plano
    errors:
      retainedArchiveCountPositive: A contagem de arquivos retidos deve ser um número inteiro positivo.
      saveErrorDetail: 'Falha ao salvar: {{error}}'
