title: Configuração inicial
welcome:
  title: Bem-vindo ao Hagicode Desktop
  description: Hagicode Desktop é o lançador local para Hagicode. Concluiremos a configuração inicial e a confirmação de conformidade em {{count}} etapas.
  features:
