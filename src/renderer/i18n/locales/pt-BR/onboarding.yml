    launch: Inicie o serviço e confirme se ele está em execução
    dependencyPreparation: Confirme se as dependências necessárias e se os pacotes do Agente CLI estão prontos
    sharingAcceleration: Confirme se a aceleração compartilhada deve permanecer habilitada por padrão
