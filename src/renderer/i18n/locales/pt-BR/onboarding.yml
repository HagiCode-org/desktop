sharingAcceleration:
  title: Aceleração de download e compartilhamento
  description: Habilitado por padrão. Os ativos de desktop/servidor mais recentes com metadados de torrent começam primeiro no torrent e retornam automaticamente.
  toggleTitle: Habilitar aceleração de compartilhamento de LAN/Internet (padrão)
  toggleDescription: Você pode desativá-lo aqui primeiro e ajustá-lo posteriormente em Configurações.
  bullets:
    latest: A propagação externa permanece focada nos ativos de desktop e de servidor mais recentes
    fallback: Se o sidecar do torrent estiver faltando ou o handshake falhar, o preenchimento substituto será iniciado automaticamente
    disable: Desative-o agora se sua rede estiver restrita ou você não quiser compartilhar
    portable: O modo portátil desativa esse recurso e nunca propaga implicitamente
dependencyPreparation:
  title: Preparar Dependências
  description: Instale as dependências de linha de comando exigidas pelo HagiCode Desktop e selecione pelo menos um Agente CLI para usar com sessões de codificação.
  loading: Verificando dependências gerenciadas pelo Desktop...
  skip:
    title: This step can be skipped
    description: You can continue to the download step without installing dependencies now. The install action adds the selected packages to Desktop's managed Node/npm environment, and you can install them later inside the app.
  environment:
    title: Ambiente Node/npm gerenciado por desktop
    description: O Desktop instala e verifica pacotes CLI gerenciados em seu próprio ambiente Node/npm. Leia o FAQ para obter detalhes sobre o caminho atual, o pacote e a solução de problemas.
    faqLinkLabel: Ver perguntas frequentes sobre o ambiente Node
    faqUrl: https://docs.hagicode.com/en/faq/desktop-node-environment/
  required:
    title: Dependências necessárias
    description: Essas dependências devem ser instaladas antes que a instalação possa continuar.
  optional:
    title: Dependências opcionais
    description: Dependências opcionais não bloqueiam a configuração.
  agentCli:
    title: Seleção de agente CLI
    description: Selecione pelo menos um Agente CLI. O CLI selecionado deve ser instalado no ambiente npm gerenciado do Desktop.
  blocking:
    environment-unavailable:
      title: Ambiente Node/npm indisponível
      description: O desktop não pode acessar seu ambiente Node/npm gerenciado. Atualize depois que a cadeia de ferramentas estiver disponível ou abra as Perguntas frequentes sobre o ambiente Node para obter detalhes de solução de problemas.
    required-packages-missing:
      title: As dependências necessárias estão faltando
      description: Instale as dependências necessárias ausentes antes de continuar.
    agent-cli-not-selected:
      title: Selecione um agente CLI
      description: Escolha pelo menos uma dependência do Agente CLI compatível.
    agent-cli-not-installed:
      title: O agente selecionado CLI não está instalado
      description: Instale pelo menos um pacote do Agente CLI selecionado no ambiente npm gerenciado do Desktop.
  actions:
    install: Confirme e instale
    refresh: Atualizar
    retry: Tentar novamente
    recheck: Verifique novamente
  complete:
    title: As dependências estão prontas
    description: As dependências necessárias estão instaladas e pelo menos um Agente CLI selecionado está pronto.
  error:
    title: Falha na preparação da dependência
legal:
  title: Contrato de licença de usuário final e política de privacidade
  descriptionFull: Antes de baixar o HagiCode Server, confirme as revisões atuais do EULA e da Política de Privacidade. Os documentos oficiais são abertos no seu navegador padrão.
  descriptionLegalOnly: As revisões legais atuais ainda não foram aceitas. Revise os documentos oficiais em seu navegador padrão e retorne ao Desktop para confirmar.
  progressFull: 'Configuração completa: {{steps}}'
  progressLegalOnly: 'Modo de compliance: a seleção de idioma aparece antes da etapa legal atual'
  browserInstruction: Abra os documentos oficiais em seu navegador padrão antes de aceitar. Desktop mostra apenas o resumo da revisão, não o texto jurídico completo.
  cacheHint: No momento, você está vendo o resumo jurídico mais recente armazenado em cache com sucesso. Atualize após a recuperação da rede para confirmar se existe uma revisão mais recente.
  unavailableHint: O resumo da revisão legal não está disponível e nenhuma cópia em cache está disponível ainda. Verifique sua rede e tente novamente; a configuração não pode continuar até que metadados válidos sejam carregados.
  reviewPrompt: Após revisar a página oficial, retorne ao Desktop e confirme sua aceitação.
  effectiveDate: Data Efetiva
  revision: Revisão
  openInBrowser: Abra {{title}} no navegador
  checkbox: Analisei o EULA e a Política de Privacidade atuais no navegador e concordo com eles.
  modeHintFull: Após a aceitação, a configuração continua compartilhando aceleração e download.
  modeHintLegalOnly: Após a aceitação, o portão fecha e a interface principal é reiniciada; recusar sai da sessão atual do aplicativo.
  accept: Aceitar e continuar
  accepting: Gravando aceitação...
  decline: Recusar e sair
  declining: Saindo...
  refresh: Atualizar metadados jurídicos
  metadata:
    remote: Últimos metadados legais carregados
    cache: Usando os últimos metadados legais armazenados em cache com êxito
    unavailable: Os metadados legais estão indisponíveis no momento
  types:
    eula: EULA
    privacy-policy: Política de Privacidade
languageSelection:
  title: Escolher idioma
  description: Escolha primeiro o idioma usado pelo Hagicode Desktop. A primeira inicialização do backend embutido também usará um padrão compatível.
  recommended: Recomendado
  selected: Selecionado
  choose: Escolher este idioma
  error: O Desktop ainda não conseguiu salvar o idioma selecionado. Tente novamente para continuar.
