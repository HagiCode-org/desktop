    inactive:
      title: Keep Hagicode AI Agent moving forward
      description: The sponsor plan is the most direct way to fund the time and token cost behind continuous AI Agent work in Desktop.
      note: AI Agent features do not stay useful on their own. They need ongoing tracking, prompt updates, implementation work, and token spend to stay aligned with fast-moving tools.
    active:
      title: Thank you for backing the next round of work
      description: This device already carries an active sponsor plan, which means you are helping keep Hagicode AI Agent current while giving us room to ship more polished sponsor-facing touches.
      note: Your purchase is more than a receipt. It directly supports the ongoing maintenance, iteration, and follow-up work that keeps the feature reliable after launch.
  message:
    ongoingTitle: Ongoing evolution needs real investment
    ongoingDescription: Hagicode is not a one-and-done product. Keeping it useful means continued author time and recurring token spend for updates, validation, and tracking change.
    perksTitle: Sponsors should receive thoughtful perks
    perksDescription: We also plan to introduce fitting sponsor benefits over time, including more refined themes and other perks as they become ready.
    unlockNoticeTitle: No feature unlocks included
    unlockNoticeDescription: The sponsor plan currently does not unlock any product features. If you need other feature access, you must purchase the corresponding license separately.
    inactivePrompt: If this direction matters to you, the sponsor plan is the direct way to support it.
    activeThanks: Thank you for the support. We will keep shaping sponsor-facing benefits with care as the product grows.
  actions:
