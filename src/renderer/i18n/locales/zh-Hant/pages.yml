      resetting: 重置導覽中...
      resetSuccess: 首頁導覽已重置
      resetError: '重置首頁導覽失敗: {{error}}'
  sharingAcceleration:
    title: 下載與分享加速
    description: 管理種子優先下載、可信任快取與自動回源策略。
    enabledTitle: 開啟區域網路/網際網路共享加速
    enabledDescription: 只要資產提供 torrent metadata，安裝即優先走種子；失敗會自動回源。
    uploadLimit: 上傳上限 (Mbps)
    cacheLimit: 快取上限 (GiB)
    retentionDays: 快取保留時間 (天)
    thresholdHint: 已提供 torrent metadata 的資產不再受 100 MB 門檻限制。
    networkHint: 若網路受限，可關閉共用加速；portable mode 會強制停用。
    portableModeHint: portable mode 下共用加速與對外做種皆停用，下載固定走 HTTP/WebSeed 回源。
    save: 儲存設定
    saving: 儲存中...
    saveSuccess: 下載與共享加速設定已儲存
    saveError: 儲存下載與共用加速設定失敗
    loadError: 讀取下載與共用加速設定失敗
    modeHint: 模式：種子優先，失敗自動回源。
    scopeHint: 對外共享主範圍：latest desktop 與 latest server。預設快取上限 5 GiB。
  updates:
    title: 後台更新
    description: 管理自動檢查、背景預下載與已驗證歸檔保留策略。
    steamMode:
      title: Updates are managed by Steam
      description: This build runs in Steam mode, so in-app background predownloads and auto-update controls are hidden here. Steam is responsible for delivering updates for this runtime.
    enabled:
      label: 啟用背景自動預先下載
      description: 偵測到相容新版本時，先在背景下載歸檔並保持目前執行版本不變。
    retainedArchiveCount:
      label: 保留的歷史歸檔數量
      description: 僅保留已驗證通過的自動下載歸檔，超過上限時會自動清理最舊記錄。
    actions:
      save: 儲存設定
      saving: 儲存中...
      cancel: 取消
    messages:
      saveSuccess: 後台更新設定已儲存
      saveFailed: 儲存後台更新設定失敗
    errors:
      retainedArchiveCountPositive: 保留數量必須是大於 0 的整數。
      saveErrorDetail: 儲存失敗：{{error}}
    notes:
      snapshotModel: 首頁提醒依賴主程序持久化快照，重新啟動 Desktop 後仍會恢復最近一次更新狀態。
      retentionPolicy: 保留策略只會清理快取歸檔文件，不會刪除已經安裝完成的版本目錄。
