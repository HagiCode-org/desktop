        description: 在 Git 設定裡，你可以保存預設的 Co-Authored-By 模式；在單次 AI Compose 執行裡，也可以臨時改成自訂協作者名稱與信箱，或這一輪完全不追加尾註。
      branding:
        title: 品牌自訂
        description: TurboEngine DLC 生效後，可以上傳頂部 Logo，設定應用標題、瀏覽器標題，以及品牌點擊跳轉連結。它不只是改左上角圖示，而是把工作台頂部整塊品牌區域開放給你自訂。
