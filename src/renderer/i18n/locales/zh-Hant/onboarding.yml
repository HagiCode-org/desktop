  progressLegalOnly: 合規攔截模式：會先顯示語言選擇，再進入目前協定確認步驟
  browserInstruction: 請先點選下方按鈕在預設瀏覽器中查看正式文件。 Desktop 只展示版本摘要，不內嵌協定全文。
  cacheHint: 目前顯示的是最近一次成功取得的協定版本摘要。建議在網路恢復後刷新並再次確認是否有更新。
  unavailableHint: 暫時無法取得協議版本摘要，也沒有可用快取。請檢查網路後重試；在取得有效版本資訊前，無法繼續。
  reviewPrompt: 閱讀完成後，再返回 Desktop 勾選同意並繼續。
  effectiveDate: 生效日期
  revision: 修訂版本
  openInBrowser: 在瀏覽器中開啟 {{title}}
  checkbox: 我已在瀏覽器中閱讀並同意當前 EULA 與隱私權政策。
  modeHintFull: 確認後將繼續進入共享加速和下載步驟。
  modeHintLegalOnly: 確認後將關閉攔截並返回主介面；拒絕則會退出目前應用。
  accept: 同意並繼續
  accepting: 正在記錄同意...
  decline: 拒絕並退出
  declining: 正在退出...
