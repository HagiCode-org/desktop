sharingAcceleration:
  title: Accélération du téléchargement et du partage
  description: Activé par défaut. Les dernières ressources de bureau/serveur avec des métadonnées torrent démarrent d'abord à partir du torrent et reviennent automatiquement.
  toggleTitle: Activer l'accélération du partage LAN/Internet (par défaut)
  toggleDescription: Vous pouvez d'abord le désactiver ici et l'ajuster plus tard dans Paramètres.
  bullets:
    latest: L'amorçage externe reste concentré sur les derniers actifs de bureau et de serveur.
    fallback: Si le side-car torrent est manquant ou si la négociation échoue, le remplissage de secours démarre automatiquement
    disable: Désactivez-le maintenant si votre réseau est restreint ou si vous ne souhaitez pas partager
    portable: Le mode portable force la désactivation de cette fonctionnalité et ne lance jamais implicitement
dependencyPreparation:
  title: Préparer les dépendances
  description: Installez les dépendances de ligne de commande requises par HagiCode Desktop et sélectionnez au moins un agent CLI à utiliser avec les sessions de codage.
  loading: Vérification des dépendances gérées par Desktop...
  environment:
    title: Environnement Node/npm géré par ordinateur
    description: Desktop installe et vérifie les packages CLI gérés dans son propre environnement Node/npm. Lisez la FAQ pour connaître le chemin actuel, le package et les détails de dépannage.
    faqLinkLabel: Afficher la FAQ sur l'environnement de nœud
    faqUrl: https://docs.hagicode.com/en/faq/desktop-node-environment/
  required:
    title: Dépendances requises
    description: Ces dépendances doivent être installées avant que l'installation puisse continuer.
  optional:
    title: Dépendances facultatives
    description: Les dépendances facultatives ne bloquent pas l'installation.
  agentCli:
    title: Sélection de l'agent CLI
    description: Sélectionnez au moins un agent CLI. Le CLI sélectionné doit être installé dans l'environnement npm géré de Desktop.
  blocking:
    environment-unavailable:
      title: Environnement nœud/npm indisponible
      description: Desktop ne peut pas accéder à son environnement Node/npm géré. Actualisez une fois la chaîne d'outils disponible ou ouvrez la FAQ sur l'environnement Node pour plus de détails sur le dépannage.
    required-packages-missing:
      title: Les dépendances requises sont manquantes
      description: Installez les dépendances requises manquantes avant de continuer.
    agent-cli-not-selected:
      title: Sélectionnez un agent CLI
      description: Choisissez au moins une dépendance Agent CLI prise en charge.
    agent-cli-not-installed:
      title: L'agent sélectionné CLI n'est pas installé
      description: Installez au moins un package Agent CLI sélectionné dans l'environnement npm géré de Desktop.
  actions:
    install: Confirmer et installer
    refresh: Actualiser
    retry: Réessayer
    recheck: Revérifier
  complete:
    title: Les dépendances sont prêtes
    description: Les dépendances requises sont installées et au moins un agent CLI sélectionné est prêt.
  error:
    title: La préparation des dépendances a échoué
legal:
  title: Contrat de licence utilisateur final et politique de confidentialité
  descriptionFull: Avant de télécharger HagiCode Server, confirmez les révisions actuelles du CLUF et de la politique de confidentialité. Les documents officiels s'ouvrent dans votre navigateur par défaut.
  descriptionLegalOnly: Les révisions juridiques actuelles n’ont pas encore été acceptées. Consultez les documents officiels dans votre navigateur par défaut, puis revenez au bureau pour confirmer.
  progressFull: 'Configuration complète: {{steps}}'
  progressLegalOnly: 'Mode Compliance Gate: la sélection de langue apparaît avant l''étape actuelle de consentement légal'
  browserInstruction: Ouvrez les documents officiels dans votre navigateur par défaut avant d'accepter. Desktop affiche uniquement le résumé de la révision, pas le texte juridique complet.
  cacheHint: Vous voyez actuellement le résumé juridique le plus récent mis en cache avec succès. Actualisez après la récupération du réseau pour confirmer si une révision plus récente existe.
  unavailableHint: Le résumé de la révision légale n'est pas disponible et aucune copie en cache n'est encore disponible. Vérifiez votre réseau et réessayez; l'installation ne peut pas continuer tant que des métadonnées valides n'ont pas été chargées.
  reviewPrompt: Après avoir consulté la page officielle, revenez au bureau et confirmez votre acceptation.
  effectiveDate: Date d'entrée en vigueur
  revision: Révision
  openInBrowser: Ouvrez {{title}} dans le navigateur
  checkbox: J'ai examiné le CLUF et la politique de confidentialité actuels dans le navigateur et je les accepte.
  modeHintFull: Après acceptation, l'installation continue de partager l'accélération et le téléchargement.
  modeHintLegalOnly: Après acceptation, le portail se ferme et l'interface principale reprend; le refus quitte la session d'application en cours.
  accept: Accepter et continuer
  accepting: Acceptation de l'enregistrement...
  decline: Refuser et quitter
  declining: Sortir...
  refresh: Actualiser les métadonnées juridiques
  metadata:
