settings:
  title: Paramètres
  tabs:
    onboarding: Intégration
    sharingAcceleration: Télécharger et partager
    updates: Mises à jour en arrière-plan
    dependencyManagement: Dependency Management
    debugOptions: Debug Options
    runtimeData: Runtime Data
  dependencyManagementMode:
    title: Dependency management mode
    description: Choose whether Desktop manages CLI dependencies itself or only inspects the current global Node/npm environment.
    effectiveMode: 'Effective mode: {{mode}}'
    options:
      internal:
        label: Internal (Desktop-managed)
        description: Desktop uses its bundled Node/npm toolchain and allows install, uninstall, and batch sync operations.
      external:
        label: External (read-only)
        description: Desktop inspects the current global Node/npm environment without changing packages or overriding npm prefixes.
    messages:
      saveSuccess: Dependency management mode saved
      saveFailed: Failed to save dependency management mode
    errors:
      saveErrorDetail: 'Save failed: {{error}}'
  smartConfig:
    title: Conseils d’invite Smart Config
    description: Examinez l'invite résolue, copiez-la dans n'importe quel AI CLI pris en charge et terminez le flux de configuration manuellement.
  onboarding:
    title: Intégration
    description: Réexécutez l'assistant de configuration initiale pour télécharger les packages, installer les dépendances et démarrer le service.
    restartWizard: Assistant de redémarrage
    restartWizardDescription: Réexécutez l'assistant de configuration initiale pour télécharger les packages, installer les dépendances et démarrer le service.
    restartButton: Assistant de redémarrage
    resetting: Réinitialisation...
    resetSuccess: L'assistant a été réinitialisé
    resetError: 'Échec de la réinitialisation: {{error}}'
    homepageTour:
      title: Réinitialiser la visite guidée de la page d'accueil
      description: Effacez l’état d’achèvement de la visite guidée de la page d’accueil afin que la visite guidée puisse être relue automatiquement la prochaine fois que vous ouvrirez la gestion du système.
      resetButton: Réinitialiser la visite guidée de la page d'accueil
      resetting: Réinitialisation de la visite...
      resetSuccess: La visite de la page d'accueil a été réinitialisée
      resetError: 'Échec de la réinitialisation de la visite guidée de la page d''accueil: {{error}}'
  sharingAcceleration:
    title: Accélération du téléchargement et du partage
    description: Gérez les téléchargements torrent d'abord, la réutilisation du cache fiable et le comportement de secours automatique.
    enabledTitle: Activer l'accélération du partage LAN/Internet
    enabledDescription: Tout actif contenant des métadonnées torrent démarre d'abord à partir du torrent et revient automatiquement en cas de besoin.
    uploadLimit: Limite de téléchargement (Mbps)
    cacheLimit: Limite de cache (Gio)
    retentionDays: Jours de rétention
    thresholdHint: Les ressources contenant des métadonnées torrent ne sont plus limitées par l'ancien seuil de 100 MB.
    networkHint: Désactivez l'accélération du partage sur les réseaux restreints; le mode portable le force toujours à le désactiver.
    portableModeHint: Le mode portable désactive l'accélération du partage et l'amorçage externe, puis conserve les téléchargements en mode de repli.
    save: Enregistrer les paramètres
    saving: Sauvegarde...
    saveSuccess: Paramètres d'accélération de partage enregistrés
    saveError: Échec de l'enregistrement des paramètres d'accélération du partage
    loadError: Échec du chargement des paramètres d'accélération du partage
    modeHint: 'Mode: torrent en premier, repli automatique en cas d''échec.'
    scopeHint: "L'amorçage externe reste concentré sur le dernier ordinateur de bureau et le dernier serveur. Limite de cache par défaut: 5\_Gio."
  updates:
    title: Mises à jour en arrière-plan
    description: Gérez les vérifications automatiques, les prétéléchargements en arrière-plan et la conservation vérifiée des archives.
    managedInstall:
      title: Auto-updates are disabled
      description: The application does not update itself automatically. How updates are delivered depends on the channel you used to install it, such as Windows Store or Steam.
    enabled:
      label: Activer les prétéléchargements en arrière-plan
      description: Lorsqu'une version plus récente compatible est trouvée, téléchargez l'archive en arrière-plan sans changer le runtime actuel.
    retainedArchiveCount:
      label: Nombre d'archives conservées
      description: Seules les archives vérifiées téléchargées automatiquement sont conservées. Les entrées plus anciennes sont supprimées lorsque la limite est dépassée.
    actions:
      save: Enregistrer les paramètres
      saving: Sauvegarde...
      cancel: Annuler
    messages:
      saveSuccess: Paramètres de mise à jour en arrière-plan enregistrés
      saveFailed: Échec de l'enregistrement des paramètres de mise à jour en arrière-plan
    errors:
      retainedArchiveCountPositive: Le nombre d’archives conservées doit être un entier positif.
      saveErrorDetail: 'Échec de l''enregistrement: {{error}}'
    notes:
      snapshotModel: Le rappel du tableau de bord est piloté par un instantané persistant du processus principal, de sorte que le dernier état de mise à jour connu survit aux rechargements du bureau.
      retentionPolicy: Le nettoyage de rétention supprime uniquement les archives et les métadonnées mises en cache. Les répertoires des versions installées restent intacts.
  runtimeDataPath:
    title: Runtime data storage path
    description: Choose where Desktop stores runtime-managed files, PM2 state, logs, and other runtime data.
    activePreset: 'Current effective preset: {{preset}}'
    environmentOverrideBadge: Environment override active
    lockedByRuntime: Locked by Windows Store
    paths:
      configuredRoot: 'Configured root: {{path}}'
      effectiveRoot: 'Effective root: {{path}}'
      environmentOverride: 'Environment override root: {{path}}'
    options:
      userData-runtime-data:
        label: userData/runtime-data (default)
        description: Stores runtime data under the Desktop Electron userData directory. Best for the default single-machine setup.
      home-runtime-data:
        label: ~/.hagicode/runtime-data
        description: Stores runtime data under the current user home directory. Best for deployments that need a stable shared path.
    warnings:
      noMigration: Changing this setting only updates the target path. Desktop does not migrate existing runtime data automatically.
      restart: Saving a changed preset stops and starts managed PM2 services so the new runtime data root takes effect immediately.
    actions:
      save: Save Changes
      saving: Saving...
      cancel: Cancel
    messages:
      unchanged: Runtime data path is already using this preset
      saveSuccess: Runtime data path saved
      restartSuccess: Runtime data path saved and managed services restarted
      saveFailed: Failed to save runtime data path
    errors:
      saveErrorDetail: 'Save failed: {{error}}'
  debugOptions:
    title: Debug Options
    description: Control Desktop-managed npm behaviors for diagnosing package installation issues.
    useIgnoreScriptsForManagedNpm:
      label: npm uses `--ignore-scripts`
      description: Make Desktop-managed npm installs and sync operations skip lifecycle scripts so postinstall-related failures are easier to isolate.
    notes:
      scope: This setting only affects future Desktop-managed npm installs and sync operations.
      npm: The npm switch only affects future Desktop-managed npm installs and sync operations. Saving it takes effect immediately and does not restart the managed service.
    actions:
      save: Save Changes
      saving: Saving...
      cancel: Cancel
    messages:
      unchanged: Debug options are already using these values
      saveSuccess: Debug options saved
      saveFailed: Failed to save debug options
    errors:
      saveErrorDetail: 'Save failed: {{error}}'
