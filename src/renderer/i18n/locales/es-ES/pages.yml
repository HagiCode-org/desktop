settings:
  title: Configuración
  tabs:
    onboarding: Incorporación
    sharingAcceleration: Descargar y compartir
    updates: Actualizaciones de fondo
  smartConfig:
    title: Guía rápida de configuración inteligente
    description: Revise el mensaje resuelto, cópielo en cualquier AI CLI compatible y complete el flujo de configuración manualmente.
  onboarding:
    title: Incorporación
    description: Vuelva a ejecutar el asistente de configuración inicial para descargar paquetes, instalar dependencias e iniciar el servicio.
    restartWizard: Asistente de reinicio
    restartWizardDescription: Vuelva a ejecutar el asistente de configuración inicial para descargar paquetes, instalar dependencias e iniciar el servicio.
    restartButton: Asistente de reinicio
    resetting: Restableciendo...
    resetSuccess: El asistente ha sido reiniciado
    resetError: 'Error al restablecer: {{error}}'
    homepageTour:
      title: Restablecer recorrido por la página de inicio
      description: Borre el estado de finalización del recorrido de la página de inicio para que el recorrido guiado pueda reproducirse automáticamente nuevamente la próxima vez que abra Administración del sistema.
      resetButton: Restablecer recorrido por la página de inicio
      resetting: Restableciendo recorrido...
      resetSuccess: El recorrido por la página de inicio se ha restablecido
      resetError: 'No se pudo restablecer el recorrido por la página de inicio: {{error}}'
  sharingAcceleration:
    title: Aceleración de descarga y uso compartido
    description: Administre las descargas de torrents, la reutilización de caché confiable y el comportamiento de respaldo automático.
    enabledTitle: Habilitar la aceleración de uso compartido de LAN/Internet
    enabledDescription: Cualquier activo con metadatos de torrent comienza primero desde torrent y retrocede automáticamente cuando es necesario.
    uploadLimit: Límite de carga (Mbps)
    cacheLimit: Límite de caché (GiB)
    retentionDays: Días de retención
    thresholdHint: Los activos con metadatos de torrent ya no están sujetos al antiguo umbral de 100 MB.
    networkHint: Deshabilite la aceleración para compartir en redes restringidas; El modo portátil siempre lo fuerza a desactivarse.
    portableModeHint: El modo portátil desactiva la aceleración de uso compartido y la propagación externa, luego mantiene las descargas en reserva HTTP/WebSeed.
    save: Guardar configuración
    saving: Guardando...
    saveSuccess: Compartir configuración de aceleración guardada
    saveError: No se pudo guardar la configuración de aceleración para compartir
    loadError: No se pudo cargar la configuración de aceleración compartida
    modeHint: 'Modo: torrent primero, respaldo automático en caso de falla.'
    scopeHint: 'La propagación externa se mantiene centrada en el último escritorio y servidor más reciente. Límite de caché predeterminado: 5 GiB.'
  updates:
    title: Actualizaciones de fondo
    description: Administre comprobaciones automáticas, descargas previas en segundo plano y retención de archivos verificados.
    steamMode:
      title: Updates are managed by Steam
      description: This build runs in Steam mode, so in-app background predownloads and auto-update controls are hidden here. Steam is responsible for delivering updates for this runtime.
    enabled:
      label: Habilitar descargas previas en segundo plano
      description: Cuando encuentre una versión más nueva compatible, descargue el archivo en segundo plano sin cambiar el tiempo de ejecución actual.
    retainedArchiveCount:
      label: Recuento de archivos retenidos
      description: Sólo se conservan los archivos descargados automáticamente y verificados. Las entradas más antiguas se eliminan cuando se excede el límite.
    actions:
      save: Guardar configuración
      saving: Guardando...
      cancel: Cancelar
    messages:
      saveSuccess: Configuración de actualización en segundo plano guardada
      saveFailed: No se pudo guardar la configuración de actualización en segundo plano
    errors:
      retainedArchiveCountPositive: El recuento de archivos retenidos debe ser un número entero positivo.
      saveErrorDetail: 'Error al guardar: {{error}}'
    notes:
      snapshotModel: El recordatorio del panel está impulsado por una instantánea persistente del proceso principal, por lo que el último estado de actualización conocido sobrevive a las recargas del escritorio.
      retentionPolicy: La limpieza de retención solo elimina archivos y metadatos almacenados en caché. Los directorios de las versiones instaladas permanecen intactos.
