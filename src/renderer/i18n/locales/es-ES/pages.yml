    inactiveDescription: TurboEngine uses a separate perpetual Microsoft Store license. This workspace lets you verify the current state, buy the license, and confirm the latest runtime diagnostics.
  article:
    unlockTitle: Compra una vez y desbloquéalo para siempre
    unlockLead: El DLC de TurboEngine reúne la alta concurrencia de propuestas, la personalización de marca, los temas ampliados y los recursos de avatar en un único paquete permanente. Tras comprarlo no hace falta suscripción, y las funciones se aplican directamente a tu espacio de trabajo actual.
    featuresTitle: Principales funciones desbloqueadas
    purchaseNoticeTitle: Notas de compra
    purchaseNoticeItems:
      channel: Las licencias no se comparten entre distintos canales de venta. Por ejemplo, una licencia comprada en Microsoft Store solo funciona con la edición de Microsoft Store.
      restart: Después de la compra, es posible que la licencia no se active de inmediato. Intente reiniciar tanto el servicio de Hagicode como Desktop, y reinicie también el equipo si hace falta.
      online: Esta licencia no admite uso sin conexión. Asegúrese de que el equipo tenga una conexión de red válida cuando Desktop se inicie.
    features:
      proposalConcurrency:
        title: El límite de concurrencia de propuestas sube de 3 a 32
        description: Sigue siendo la mejora más importante y más perceptible del DLC de TurboEngine. Las propuestas en generación, ejecución y archivo comparten los mismos huecos de concurrencia, así que el límite alto cambia directamente si puedes avanzar con varias líneas de trabajo en paralelo de forma estable.
      documentThemes:
        title: Temas de documento ampliados
        description: En las pantallas de gestión de agentes puedes cambiar entre opciones ampliadas de Document Theme y previsualizar en tiempo real cómo se ven el banco de trabajo, el historial y las agrupaciones de respaldo con distinta terminología y redacción.
      composeCommitCoAuthor:
        title: Co-Authored-By personalizado para AI Compose Commit
        description: En la configuración de Git puedes guardar un modo predeterminado de Co-Authored-By. En una ejecución concreta de AI Compose también puedes cambiar temporalmente a un colaborador personalizado con nombre y correo, o no añadir ese pie en esa ronda.
      branding:
        title: Personalización de marca
        description: Cuando el DLC de TurboEngine está activo, puedes subir un logotipo a la cabecera y configurar el título de la app, el del navegador y el enlace de la marca. No se trata solo de cambiar el icono de la esquina superior izquierda, sino de abrir toda la zona de marca del encabezado del workbench a tu personalización.
      avatarUpload:
        title: Subida de avatares personalizados y reutilización compartida
        description: Ahora ya puedes subir un avatar personalizado para el agente actual y reutilizar la biblioteca compartida de avatares personalizados en los flujos de creación, edición y creación por lotes.
      avatarPacks:
        title: Más recursos de avatar
        description: Se incluyen cinco nuevos conjuntos integrados de avatares para agentes.
