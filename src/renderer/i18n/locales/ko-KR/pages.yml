  article:
    unlockTitle: 한 번 구매로 영구 해제
    unlockLead: TurboEngine DLC는 높은 제안 동시성, 브랜드 맞춤 설정, 확장 테마, 아바타 리소스를 하나의 영구 해제 패키지로 묶어 제공합니다. 구매 후에는 구독이 필요 없고, 기능이 현재 작업대 경험에 바로 적용됩니다.
    featuresTitle: 주요 해제 기능
    purchaseNoticeTitle: 구매 안내
    purchaseNoticeItems:
      channel: 라이선스 권한은 판매 채널 간에 서로 연동되지 않습니다. 예를 들어 Microsoft Store에서 구매한 라이선스는 Microsoft Store 에디션에서만 사용할 수 있습니다.
      restart: 구매 후에도 권한이 바로 적용되지 않을 수 있습니다. Hagicode 서비스와 Desktop을 다시 시작해 보고, 필요하면 컴퓨터도 재부팅하세요.
      online: 이 라이선스는 오프라인 사용을 지원하지 않습니다. Desktop이 시작될 때 컴퓨터가 정상적으로 인터넷에 연결되어 있는지 확인하세요.
    features:
      proposalConcurrency:
        title: 제안 동시성 한도가 3에서 32로 증가
        description: 여전히 TurboEngine DLC에서 가장 핵심적이고 체감이 큰 업그레이드입니다. 생성, 실행, 보관 중인 제안이 같은 동시성 슬롯을 함께 사용하므로, 높은 한도는 여러 작업 흐름을 안정적으로 병렬 진행할 수 있는지를 직접 바꿉니다.
      documentThemes:
        title: 확장 문서 테마
        description: Agent 관리 화면에서 확장된 Document Theme를 전환하고, 작업대, 기록 영역, 폴백 그룹이 다른 용어와 문구에서 어떻게 보이는지 실시간으로 미리 볼 수 있습니다.
      composeCommitCoAuthor:
        title: AI Compose Commit용 Co-Authored-By 사용자 지정
        description: Git 설정에서 기본 Co-Authored-By 모드를 저장할 수 있습니다. 개별 AI Compose 실행에서는 사용자 지정 협업자 이름과 이메일로 잠시 바꾸거나, 그 회차에서는 꼬리말을 아예 추가하지 않을 수도 있습니다.
      branding:
        title: 브랜드 맞춤 설정
        description: TurboEngine DLC가 활성화되면 헤더 로고를 업로드하고 앱 제목, 브라우저 제목, 브랜드 클릭 링크를 설정할 수 있습니다. 왼쪽 상단 아이콘만 바꾸는 것이 아니라, 작업대 상단의 브랜드 영역 전체를 맞춤 설정할 수 있게 됩니다.
      avatarUpload:
        title: 사용자 지정 아바타 업로드와 공유 재사용
        description: 현재 Agent용 사용자 지정 아바타를 업로드할 수 있고, 공유 사용자 지정 아바타 라이브러리도 생성, 편집, 일괄 생성 흐름에서 다시 사용할 수 있습니다.
