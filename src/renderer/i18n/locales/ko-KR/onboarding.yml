  descriptionFull: HagiCode Server를 다운로드하기 전에 현재 EULA 및 개인정보 보호정책 개정을 확인하세요. 공식 문서는 기본 브라우저에서 열립니다.
  descriptionLegalOnly: 현재의 법적 개정은 아직 승인되지 않았습니다. 기본 브라우저에서 공식 문서를 검토한 다음 데스크톱으로 돌아가 확인하세요.
