    title: 데스크탑 관리 노드/npm 환경
    description: Desktop은 자체 Node/0 환경에서 관리되는 패키지를 설치하고 확인합니다. 현재 경로, 패키지 및 문제 해결 세부 정보는 FAQ를 읽어보세요.
    faqLinkLabel: 노드 환경 FAQ 보기
    faqUrl: https://docs.hagicode.com/en/faq/desktop-node-environment/
  required:
    title: 필수 종속성
    description: 설치를 계속하려면 먼저 이러한 종속성을 설치해야 합니다.
