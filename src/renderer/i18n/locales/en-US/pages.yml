subscription:
  eyebrow: Microsoft Store sponsor plan
  title: Hagicode Sponsor Plan
  description: Support the continued evolution of Hagicode AI Agent and keep sponsor entitlements visible on the current device.
  loading: Reading the latest cached sponsor snapshot...
