      resetError: 'Failed to reset homepage tour: {{error}}'
  sharingAcceleration:
    title: Download & Sharing Acceleration
    description: Manage torrent-first downloads, trusted cache reuse, and automatic fallback behavior.
    enabledTitle: Enable LAN/Internet sharing acceleration
    enabledDescription: Any asset with torrent metadata starts from torrent first and falls back automatically when needed.
    uploadLimit: Upload limit (Mbps)
    cacheLimit: Cache limit (GiB)
    retentionDays: Retention days
    thresholdHint: Assets with torrent metadata are no longer gated by the old 100 MB threshold.
    networkHint: Disable sharing acceleration on restricted networks; portable mode always forces it off.
    portableModeHint: Portable mode disables sharing acceleration and external seeding, then keeps downloads on HTTP/WebSeed fallback.
    save: Save Settings
    saving: Saving...
    saveSuccess: Sharing acceleration settings saved
    saveError: Failed to save sharing acceleration settings
    loadError: Failed to load sharing acceleration settings
    modeHint: 'Mode: torrent first, automatic fallback on failure.'
    scopeHint: 'External seeding stays focused on latest desktop and latest server. Default cache limit: 5 GiB.'
  updates:
    title: Background Updates
    description: Manage automatic checks, background predownloads, and verified archive retention.
    managedInstall:
      title: Auto-updates are disabled
      description: The application does not update itself automatically. How updates are delivered depends on the channel you used to install it, such as Windows Store or Steam.
    enabled:
      label: Enable background predownloads
      description: When a compatible newer version is found, download the archive in the background without switching the current runtime.
    retainedArchiveCount:
      label: Retained archive count
      description: Only verified auto-downloaded archives are kept. Older entries are removed when the limit is exceeded.
    actions:
      save: Save Settings
      saving: Saving...
      cancel: Cancel
    messages:
      saveSuccess: Background update settings saved
      saveFailed: Failed to save background update settings
    errors:
      retainedArchiveCountPositive: Retained archive count must be a positive integer.
      saveErrorDetail: 'Save failed: {{error}}'
    notes:
      snapshotModel: The dashboard reminder is driven by a persisted main-process snapshot, so the last known update state survives Desktop reloads.
      retentionPolicy: Retention cleanup only removes cached archives and metadata. Installed version directories stay untouched.
  runtimeDataPath:
    title: Runtime data storage path
    description: Choose where Desktop stores runtime-managed files, PM2 state, logs, and other runtime data.
    activePreset: 'Current effective preset: {{preset}}'
    environmentOverrideBadge: Environment override active
    lockedByRuntime: Locked by Windows Store
    paths:
      configuredRoot: 'Configured root: {{path}}'
      effectiveRoot: 'Effective root: {{path}}'
      environmentOverride: 'Environment override root: {{path}}'
    options:
      userData-runtime-data:
        label: userData/runtime-data (default)
        description: Stores runtime data under the Desktop Electron userData directory. Best for the default single-machine setup.
      home-runtime-data:
        label: ~/.hagicode/runtime-data
        description: Stores runtime data under the current user home directory. Best for deployments that need a stable shared path.
    warnings:
      noMigration: Changing this setting only updates the target path. Desktop does not migrate existing runtime data automatically.
      restart: Saving a changed preset stops and starts managed PM2 services so the new runtime data root takes effect immediately.
    actions:
      save: Save Changes
      saving: Saving...
      cancel: Cancel
    messages:
      unchanged: Runtime data path is already using this preset
      saveSuccess: Runtime data path saved
      restartSuccess: Runtime data path saved and managed services restarted
      saveFailed: Failed to save runtime data path
    errors:
      saveErrorDetail: 'Save failed: {{error}}'
  debugOptions:
    title: Debug Options
    description: Control Desktop-managed npm behaviors for diagnosing package installation issues.
    useIgnoreScriptsForManagedNpm:
      label: npm uses `--ignore-scripts`
      description: Make Desktop-managed npm installs and sync operations skip lifecycle scripts so postinstall-related failures are easier to isolate.
    notes:
      scope: This setting only affects future Desktop-managed npm installs and sync operations.
      npm: The npm switch only affects future Desktop-managed npm installs and sync operations. Saving it takes effect immediately and does not restart the managed service.
    actions:
      save: Save Changes
      saving: Saving...
      cancel: Cancel
    messages:
      unchanged: Debug options are already using these values
      saveSuccess: Debug options saved
      saveFailed: Failed to save debug options
    errors:
      saveErrorDetail: 'Save failed: {{error}}'
