    enabledTitle: Enable LAN/Internet sharing acceleration
    enabledDescription: Any asset with torrent metadata starts from torrent first and falls back automatically when needed.
    uploadLimit: Upload limit (Mbps)
    cacheLimit: Cache limit (GiB)
    retentionDays: Retention days
    thresholdHint: Assets with torrent metadata are no longer gated by the old 100 MB threshold.
    networkHint: Disable sharing acceleration on restricted networks; portable mode always forces it off.
    portableModeHint: Portable mode disables sharing acceleration and external seeding, then keeps downloads on HTTP/WebSeed fallback.
