  article:
    unlockTitle: 一次购买，永久解锁
    unlockLead: TurboEngine DLC 把高并发提案、品牌定制、主题扩展和头像资源整合成一个永久解锁包。买断后不需要订阅，功能会直接作用到你当前这套工作台体验。
    featuresTitle: 主要解锁特性
    purchaseNoticeTitle: 购买须知
    purchaseNoticeItems:
      channel: 不同销售渠道的授权许可并不互通。例如你在 Microsoft Store 购买的许可，也只能配套在 Microsoft Store 版本中使用。
      restart: 购买之后，程序上也许不会立即生效。你需要尝试重新启动 Hagicode 服务和 Desktop 以便正确生效；必要时可能还需要重启计算机。
      online: 授权并不支持离线使用。因此你需要确保在启动 Desktop 时，当前计算机处于正确的联网状态。
    features:
      proposalConcurrency:
        title: 提案并发上限从 3 提升到 32
        description: 这仍然是 Turbo Engine DLC 最核心、最有体感的升级。生成、执行、归档中的提案会共同占用并发位，所以高上限会直接改变你能不能稳定并行推进多条任务线。
      documentThemes:
        title: 扩展文档主题
        description: 可以在 Agent 管理相关界面里切换扩展的 Document Theme，实时预览工作台、历史区和兜底编组在不同主题下的术语与文案表现。
      composeCommitCoAuthor:
        title: AI Compose Commit 的 Co-Authored-By 自定义
        description: 在 Git 设置里，你可以保存默认的 Co-Authored-By 模式；在单次 AI Compose 运行里，也可以临时改成自定义协作者名称与邮箱，或者这一轮完全不追加该尾注。
      branding:
        title: 品牌自定义
        description: Turbo Engine DLC 生效后，可以上传头部 Logo，设置应用标题、浏览器标题，以及品牌点击跳转链接。它不只是改一个左上角图标，而是把工作台头部品牌整块开放给你定制。
      avatarUpload:
        title: 自定义头像上传与共享复用
        description: 现在已经支持上传当前 Agent 的自定义头像，也支持把共享自定义头像库复用到新建、编辑和批量创建流程里。
