sharingAcceleration:
  title: ダウンロードと共有の高速化
  description: デフォルトで有効になっています。トレント メタデータを含む最新のデスクトップ/サーバー アセットは、まずトレントから開始され、自動的にフォールバックします。
  toggleTitle: LAN/インターネット共有アクセラレーションを有効にする (デフォルト)
  toggleDescription: 最初にここで無効にし、後で [設定] で調整できます。
  bullets:
    latest: 外部シードは最新のデスクトップおよび最新のサーバー資産に重点を置き続けます
    fallback: torrent サイドカーが見つからない場合、またはハンドシェイクが失敗した場合、フォールバック バックフィルが自動的に開始されます
    disable: ネットワークが制限されている場合、または共有したくない場合は、今すぐ無効にしてください
    portable: ポータブル モードではこの機能が強制的にオフになり、暗黙的にシードされることはありません
dependencyPreparation:
  title: 依存関係の準備
  description: HagiCode Desktop に必要なコマンドラインの依存関係をインストールし、コーディング セッションで使用するエージェント CLI を少なくとも 1 つ選択します。
  loading: デスクトップ管理の依存関係を確認しています...
  skip:
    title: This step can be skipped
    description: You can continue to the download step without installing dependencies now. The install action adds the selected packages to Desktop's managed Node/npm environment, and you can install them later inside the app.
  environment:
    title: デスクトップ管理型ノード/npm環境
    description: デスクトップは、管理対象 CLI パッケージを独自の Node/npm 環境にインストールし、チェックします。現在のパス、パッケージ、トラブルシューティングの詳細については、FAQ を参照してください。
    faqLinkLabel: ノード環境のよくある質問を見る
    faqUrl: https://docs.hagicode.com/en/faq/desktop-node-environment/
  required:
    title: 必要な依存関係
    description: セットアップを続行するには、これらの依存関係をインストールする必要があります。
  optional:
    title: オプションの依存関係
    description: オプションの依存関係によってセットアップがブロックされることはありません。
  agentCli:
    title: エージェント CLI の選択
    description: 少なくとも 1 つのエージェント CLI を選択します。選択した CLI は、Desktop の管理された npm 環境にインストールする必要があります。
  blocking:
    environment-unavailable:
      title: ノード/npm環境は使用できません
      description: デスクトップは管理対象の Node/npm 環境にアクセスできません。ツールチェーンが利用可能になった後に更新するか、トラブルシューティングの詳細についてはノード環境 FAQ を開いてください。
    required-packages-missing:
      title: 必要な依存関係がありません
      description: 続行する前に、不足している必要な依存関係をインストールしてください。
    agent-cli-not-selected:
      title: エージェント CLI を選択してください
      description: サポートされているエージェント CLI 依存関係を少なくとも 1 つ選択します。
    agent-cli-not-installed:
      title: 選択したエージェント CLI はインストールされていません
      description: 選択した少なくとも 1 つの Agent CLI パッケージを Desktop の管理対象 npm 環境にインストールします。
  actions:
    install: 確認してインストールする
    refresh: リフレッシュ
    retry: 再試行
    recheck: 再確認
  complete:
    title: 依存関係の準備ができました
    description: 必要な依存関係がインストールされており、選択したエージェント CLI が少なくとも 1 つ用意されています。
  error:
    title: 依存関係の準備に失敗しました
