turboEngine:
  eyebrow: Microsoft Store 永久ライセンス
  loadingTitle: TurboEngine の状態を読み込んでいます
  loading: キャッシュされた TurboEngine スナップショットを読み込んでいます...
  verifyingTitle: 起動時の検証を実行中です
  verifyingDescription: Desktop は起動時に Microsoft Store をライブ確認し、キャッシュされた TurboEngine 情報が最終状態のまま残らないようにします。
  verifyingBadge: 検証中
  staleBadge: キャッシュされたスナップショット
  errorTitle: TurboEngine スナップショットを取得できません
  errorDescription: 'Desktop は TurboEngine スナップショットを読み込めませんでした: {{error}}'
  hero:
    title: TurboEngine workspace
    activeDescription: TurboEngine is already licensed on this device. You can confirm the current Microsoft Store state, review diagnostics, and refresh whenever needed.
    inactiveDescription: TurboEngine uses a separate perpetual Microsoft Store license. This workspace lets you verify the current state, buy the license, and confirm the latest runtime diagnostics.
  article:
    unlockTitle: 一度購入すれば永続的に解放
    unlockLead: TurboEngine DLC は、高い提案同時実行数、ブランドのカスタマイズ、拡張テーマ、アバター素材を 1 つの恒久的な解放パックにまとめたものです。購入後はサブスクリプション不要で、機能はそのまま現在のワークベンチ体験に反映されます。
    featuresTitle: 主な解放内容
    purchaseNoticeTitle: 購入に関する注意
    purchaseNoticeItems:
      channel: ライセンス権利は販売チャネル間で共有されません。たとえば Microsoft Store で購入したライセンスは、Microsoft Store 版でのみ利用できます。
      restart: 購入後すぐに権利が反映されない場合があります。Hagicode サービスと Desktop の両方を再起動し、必要であればコンピューターも再起動してください。
      online: このライセンスはオフライン利用に対応していません。Desktop の起動時には、コンピューターが正常にネットワーク接続されていることを確認してください。
    features:
      proposalConcurrency:
        title: 提案の同時実行上限が 3 から 32 に拡張
        description: これは今でも TurboEngine DLC の中核であり、日常的な体感差が最も大きいアップグレードです。生成、実行、アーカイブ中の提案は同じ同時実行枠を共有するため、上限が高いほど複数の作業ラインを安定して並行進行できるかが大きく変わります。
      documentThemes:
        title: 拡張ドキュメントテーマ
        description: Agent 管理画面では拡張された Document Theme を切り替えられ、ワークベンチ、履歴エリア、フォールバック分類が異なる用語や文言でどう見えるかをリアルタイムで確認できます。
      composeCommitCoAuthor:
        title: AI Compose Commit の Co-Authored-By をカスタマイズ
        description: Git 設定では既定の Co-Authored-By モードを保存できます。単発の AI Compose 実行では、その回だけ共同執筆者名とメールアドレスをカスタマイズしたり、末尾自体を付けないこともできます。
      branding:
        title: ブランドのカスタマイズ
        description: TurboEngine DLC が有効になると、ヘッダーロゴをアップロードし、アプリタイトル、ブラウザータイトル、ブランドクリック先リンクを設定できます。左上のアイコンを変えるだけではなく、ワークベンチ上部のブランド領域全体をカスタマイズできます。
      avatarUpload:
        title: カスタムアバターのアップロードと共有再利用
        description: 現在の Agent 用にカスタムアバターをアップロードできるようになり、共有カスタムアバターライブラリも作成、編集、一括作成の各フローで再利用できます。
      avatarPacks:
        title: さらに多くのアバター素材
        description: 新しい内蔵 Agent アバターセットが 5 組追加されています。
