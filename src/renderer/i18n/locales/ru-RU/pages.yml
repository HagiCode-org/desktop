settings:
  title: Настройки
  tabs:
    onboarding: Регистрация
    sharingAcceleration: Скачать и поделиться
    updates: Фоновые обновления
  smartConfig:
    title: Оперативное руководство Smart Config
    description: Просмотрите решенное приглашение, скопируйте его в любой поддерживаемый AI CLI и завершите процесс настройки вручную.
  onboarding:
    title: Регистрация
    description: Повторно запустите мастер первоначальной установки, чтобы загрузить пакеты, установить зависимости и запустить службу.
    restartWizard: Мастер перезапуска
    restartWizardDescription: Повторно запустите мастер первоначальной установки, чтобы загрузить пакеты, установить зависимости и запустить службу.
    restartButton: Мастер перезапуска
    resetting: Сброс...
    resetSuccess: Мастер был сброшен
    resetError: 'Сброс не удался: {{error}}'
    homepageTour:
      title: Сбросить тур по домашней странице
      description: Очистите состояние завершения обзора домашней страницы, чтобы пошаговое руководство могло автоматически воспроизводиться снова при следующем открытии «Управление системой».
      resetButton: Сбросить тур по домашней странице
      resetting: Сброс тура...
      resetSuccess: Тур по главной странице сброшен.
      resetError: 'Не удалось сбросить тур по главной странице: {{error}}'
  sharingAcceleration:
    title: Ускорение загрузки и обмена
    description: Управляйте загрузками через торрент, повторным использованием доверенного кэша и автоматическим резервным режимом.
    enabledTitle: Включить ускорение совместного использования локальной сети/Интернета
    enabledDescription: Любой ресурс с метаданными торрента сначала запускается с торрента и автоматически возвращается к исходному состоянию при необходимости.
    uploadLimit: Лимит загрузки (Мбит/с)
    cacheLimit: Предел кэша (ГиБ)
    retentionDays: Дни хранения
    thresholdHint: Ресурсы с метаданными торрента больше не ограничиваются старым порогом в 100 MB.
    networkHint: Отключить ускорение обмена в сетях с ограниченным доступом; портативный режим всегда выключает его.
    portableModeHint: Портативный режим отключает ускорение общего доступа и внешнее раздачу, а затем сохраняет загрузку в резервном режиме HTTP/WebSeed.
    save: Сохранить настройки
    saving: Сохранение...
    saveSuccess: Настройки ускорения сохранены.
    saveError: Не удалось сохранить настройки ускорения общего доступа.
    loadError: Не удалось загрузить настройки ускорения общего доступа.
    modeHint: 'Режим: сначала торрент, автоматический возврат в случае сбоя.'
    scopeHint: 'Внешнее разбрасывание по-прежнему сосредоточено на новейших настольных компьютерах и новейших серверах. Ограничение кэша по умолчанию: 5 ГиБ.'
  updates:
    title: Фоновые обновления
    description: Управляйте автоматическими проверками, фоновыми предварительными загрузками и хранением проверенных архивов.
    enabled:
      label: Включить фоновую предварительную загрузку
      description: Когда будет найдена более новая совместимая версия, загрузите архив в фоновом режиме, не переключая текущую среду выполнения.
    retainedArchiveCount:
      label: Сохраненное количество архивов
      description: Сохраняются только проверенные автоматически загруженные архивы. Старые записи удаляются при превышении лимита.
    actions:
      save: Сохранить настройки
      saving: Сохранение...
      cancel: Отмена
    messages:
      saveSuccess: Настройки фонового обновления сохранены.
      saveFailed: Не удалось сохранить настройки фонового обновления.
    errors:
      retainedArchiveCountPositive: Счетчик сохраненных архивов должен быть положительным целым числом.
      saveErrorDetail: 'Не удалось сохранить: {{error}}'
    notes:
      snapshotModel: Напоминание на информационной панели создается на основе сохраняемого снимка основного процесса, поэтому последнее известное состояние обновления сохраняется при перезагрузке рабочего стола.
      retentionPolicy: При очистке хранилища удаляются только кэшированные архивы и метаданные. Каталоги установленных версий остаются нетронутыми.
