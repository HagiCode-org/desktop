  errorDescription: 'Desktop не удалось загрузить снимок TurboEngine: {{error}}'
  hero:
    title: TurboEngine workspace
    activeDescription: TurboEngine is already licensed on this device. You can confirm the current Microsoft Store state, review diagnostics, and refresh whenever needed.
    inactiveDescription: TurboEngine uses a separate perpetual Microsoft Store license. This workspace lets you verify the current state, buy the license, and confirm the latest runtime diagnostics.
  article:
    unlockTitle: Купите один раз и разблокируйте навсегда
    unlockLead: DLC TurboEngine объединяет высокую параллельность предложений, настройку бренда, расширенные темы и ресурсы аватаров в один постоянный пакет. После покупки подписка не нужна, а возможности сразу влияют на ваш текущий рабочий стол.
    featuresTitle: Основные разблокировки
    purchaseNoticeTitle: Важная информация о покупке
    purchaseNoticeItems:
      channel: Лицензии не переносятся между разными каналами продаж. Например, лицензия, купленная в Microsoft Store, работает только с версией из Microsoft Store.
      restart: После покупки право может активироваться не сразу. Попробуйте перезапустить сервис Hagicode и Desktop, а при необходимости также перезагрузите компьютер.
      online: Эта лицензия не поддерживает офлайн-использование. Убедитесь, что при запуске Desktop компьютер находится в рабочем онлайн-состоянии.
    features:
      proposalConcurrency:
        title: Лимит параллельности предложений увеличен с 3 до 32
        description: Это по-прежнему главное и наиболее заметное обновление DLC TurboEngine. Предложения в генерации, выполнении и архиве занимают общие слоты параллельности, поэтому высокий лимит напрямую влияет на то, сможете ли вы стабильно вести несколько рабочих линий параллельно.
      documentThemes:
        title: Расширенные темы документов
        description: На экранах управления агентами можно переключать расширенные варианты Document Theme и сразу смотреть, как меняются рабочая область, история и резервные группировки при другой терминологии и формулировках.
      composeCommitCoAuthor:
        title: Настраиваемый Co-Authored-By для AI Compose Commit
        description: В настройках Git можно сохранить режим Co-Authored-By по умолчанию. Во время отдельного запуска AI Compose можно временно указать имя и почту соавтора вручную или вовсе не добавлять этот хвост в данном запуске.
      branding:
        title: Настройка бренда
        description: После активации DLC TurboEngine можно загрузить логотип в шапку и настроить заголовок приложения, заголовок браузера и ссылку бренда. Это не просто замена значка слева сверху, а открытие всей брендовой области шапки рабочего пространства для настройки.
      avatarUpload:
        title: Загрузка собственных аватаров и общее повторное использование
        description: Теперь можно загружать собственный аватар для текущего агента, а общую библиотеку пользовательских аватаров использовать повторно в сценариях создания, редактирования и пакетного создания.
      avatarPacks:
        title: Больше ресурсов аватаров
        description: В комплект входят пять новых встроенных наборов аватаров для агента.
