    scopeHint: 'Внешнее разбрасывание по-прежнему сосредоточено на новейших настольных компьютерах и новейших серверах. Ограничение кэша по умолчанию: 5 ГиБ.'
  updates:
    title: Фоновые обновления
    description: Управляйте автоматическими проверками, фоновыми предварительными загрузками и хранением проверенных архивов.
    managedInstall:
      title: Auto-updates are disabled
      description: The application does not update itself automatically. How updates are delivered depends on the channel you used to install it, such as Microsoft Store or Steam.
    enabled:
      label: Включить фоновую предварительную загрузку
      description: Когда будет найдена более новая совместимая версия, загрузите архив в фоновом режиме, не переключая текущую среду выполнения.
    retainedArchiveCount:
      label: Сохраненное количество архивов
      description: Сохраняются только проверенные автоматически загруженные архивы. Старые записи удаляются при превышении лимита.
    actions:
      save: Сохранить настройки
      saving: Сохранение...
      cancel: Отмена
    messages:
      saveSuccess: Настройки фонового обновления сохранены.
      saveFailed: Не удалось сохранить настройки фонового обновления.
    errors:
      retainedArchiveCountPositive: Счетчик сохраненных архивов должен быть положительным целым числом.
      saveErrorDetail: 'Не удалось сохранить: {{error}}'
    notes:
      snapshotModel: Напоминание на информационной панели создается на основе сохраняемого снимка основного процесса, поэтому последнее известное состояние обновления сохраняется при перезагрузке рабочего стола.
      retentionPolicy: При очистке хранилища удаляются только кэшированные архивы и метаданные. Каталоги установленных версий остаются нетронутыми.
  runtimeDataPath:
    title: Runtime data storage path
    description: Choose where Desktop stores runtime-managed files, PM2 state, logs, and other runtime data.
    activePreset: 'Current effective preset: {{preset}}'
    environmentOverrideBadge: Environment override active
    lockedByRuntime: Locked by Microsoft Store
    paths:
      configuredRoot: 'Configured root: {{path}}'
      effectiveRoot: 'Effective root: {{path}}'
      environmentOverride: 'Environment override root: {{path}}'
    options:
      userData-runtime-data:
        label: userData/runtime-data (default)
        description: Stores runtime data under the Desktop Electron userData directory. Best for the default single-machine setup.
      home-runtime-data:
        label: ~/.hagicode/runtime-data
        description: Stores runtime data under the current user home directory. Best for deployments that need a stable shared path.
    warnings:
      noMigration: Changing this setting only updates the target path. Desktop does not migrate existing runtime data automatically.
      restart: Saving a changed preset stops and starts managed PM2 services so the new runtime data root takes effect immediately.
    actions:
      save: Save Changes
      saving: Saving...
      cancel: Cancel
    messages:
      unchanged: Runtime data path is already using this preset
      saveSuccess: Runtime data path saved
      restartSuccess: Runtime data path saved and managed services restarted
      saveFailed: Failed to save runtime data path
    errors:
      saveErrorDetail: 'Save failed: {{error}}'
  debugOptions:
    title: Debug Options
    description: Control Desktop-managed npm behaviors for diagnosing package installation issues.
    useIgnoreScriptsForManagedNpm:
      label: npm uses `--ignore-scripts`
      description: Make Desktop-managed npm installs and sync operations skip lifecycle scripts so postinstall-related failures are easier to isolate.
    installDate:
      label: Raw install date (msstoreRatingPrompt.installDate)
      description: Shows the exact persisted raw install date string in local config. Click repeatedly and edit to update saved value.
      placeholder: e.g. 2024-01-01T00:00:00.000Z
      ageDays: 'Install age (days): {{value}}'
      ageDaysUnknown: unknown
    notes:
      scope: This setting only affects future Desktop-managed npm installs and sync operations.
      npm: The npm switch only affects future Desktop-managed npm installs and sync operations. Saving it takes effect immediately and does not restart the managed service.
    actions:
      save: Save Changes
      saving: Saving...
      cancel: Cancel
    messages:
      unchanged: Debug options are already using these values
      saveSuccess: Debug options saved
      saveFailed: Failed to save debug options
    errors:
      saveErrorDetail: 'Save failed: {{error}}'
