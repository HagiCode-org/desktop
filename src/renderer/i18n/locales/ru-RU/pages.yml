turboEngine:
  eyebrow: Постоянная лицензия Microsoft Store
  loadingTitle: Загрузка статуса TurboEngine
  loading: Чтение снимка TurboEngine из кэша...
  verifyingTitle: Идет проверка при запуске
  verifyingDescription: Desktop проверяет Microsoft Store при запуске, чтобы кэшированные данные TurboEngine не оставались окончательным состоянием.
  verifyingBadge: Проверка
  staleBadge: Снимок из кэша
