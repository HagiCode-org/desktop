    sharingAcceleration: Подтвердите, должно ли общее ускорение оставаться включенным по умолчанию.
    legalConsent: Подтвердите текущие версии лицензионного соглашения и Политики конфиденциальности, а затем просмотрите официальные страницы в своем браузере.
