sharingAcceleration:
  title: Ускорение загрузки и обмена
  description: Включено по умолчанию. Последние ресурсы рабочего стола/сервера с метаданными торрента сначала запускаются с торрента и автоматически возвращаются обратно.
  toggleTitle: Включить ускорение общего доступа к локальной сети/Интернету (по умолчанию)
  toggleDescription: Вы можете сначала отключить его здесь и настроить позже в настройках.
  bullets:
    latest: Внешнее распространение по-прежнему сосредоточено на новейших настольных компьютерах и новейших серверных ресурсах.
    fallback: Если торрент-сайдкар отсутствует или не удается выполнить рукопожатие, автоматически запускается резервное заполнение.
    disable: Отключите его сейчас, если ваша сеть ограничена или вы не хотите делиться
    portable: В портативном режиме эта функция отключается и никогда не используется неявно.
dependencyPreparation:
  title: Подготовьте зависимости
  description: Установите зависимости командной строки, необходимые для HagiCode Desktop, и выберите хотя бы один агент CLI для использования в сеансах кодирования.
  loading: Проверка зависимостей, управляемых настольным компьютером...
  skip:
    title: This step can be skipped
    description: You can continue to the download step without installing dependencies now. The install action adds the selected packages to Desktop's managed Node/npm environment, and you can install them later inside the app.
  environment:
    title: Управляемая настольным компьютером среда Node/npm
    description: Desktop устанавливает и проверяет управляемые пакеты CLI в своей собственной среде Node/npm. Прочтите FAQ, чтобы узнать текущий путь, пакет и сведения об устранении неполадок.
    faqLinkLabel: Посмотреть часто задаваемые вопросы по среде Node
    faqUrl: https://docs.hagicode.com/en/faq/desktop-node-environment/
  required:
    title: Необходимые зависимости
    description: Эти зависимости необходимо установить, прежде чем установка сможет продолжиться.
  optional:
    title: Дополнительные зависимости
    description: Необязательные зависимости не блокируют установку.
  agentCli:
    title: Выбор агента CLI
    description: Выберите хотя бы одного агента CLI. Выбранный CLI должен быть установлен в управляемой среде npm Desktop.
  blocking:
    environment-unavailable:
      title: Узел/среда npm недоступна
      description: Рабочий стол не может получить доступ к своей управляемой среде Node/npm. Обновите страницу после того, как набор инструментов станет доступен, или откройте раздел Часто задаваемые вопросы по среде Node, чтобы получить подробную информацию об устранении неполадок.
    required-packages-missing:
      title: Отсутствуют необходимые зависимости
      description: Прежде чем продолжить, установите недостающие необходимые зависимости.
    agent-cli-not-selected:
      title: Выберите агента CLI
      description: Выберите хотя бы одну поддерживаемую зависимость агента CLI.
    agent-cli-not-installed:
      title: Выбранный агент CLI не установлен
      description: Установите хотя бы один выбранный пакет агента CLI в управляемую среду npm Desktop.
  actions:
    install: Подтвердите и установите
    refresh: Обновить
    retry: Повторить попытку
    recheck: Перепроверить
  complete:
    title: Зависимости готовы
    description: Необходимые зависимости установлены и по крайней мере один выбранный Агент CLI готов.
  error:
    title: Подготовка зависимостей не удалась
legal:
  title: Лицензионное соглашение с конечным пользователем и политика конфиденциальности
  descriptionFull: Перед загрузкой HagiCode Server подтвердите текущие версии EULA и Политики конфиденциальности. Официальные документы открываются в браузере по умолчанию.
  descriptionLegalOnly: Текущие правовые поправки еще не приняты. Просмотрите официальные документы в браузере по умолчанию, а затем вернитесь на рабочий стол для подтверждения.
  progressFull: 'Полная настройка: {{steps}}'
  progressLegalOnly: 'Режим compliance gate: перед текущим этапом юридического согласия показывается выбор языка'
  browserInstruction: Прежде чем согласиться, откройте официальные документы в браузере по умолчанию. На рабочем столе отображается только сводка изменений, а не полный юридический текст.
  cacheHint: В настоящее время вы видите самую последнюю успешно кэшированную юридическую сводку. Обновите после восстановления сети, чтобы подтвердить, существует ли более новая версия.
  unavailableHint: Сводка юридических изменений недоступна, и кэшированная копия пока недоступна. Проверьте свою сеть и повторите попытку; установка не может продолжиться, пока не будут загружены действительные метаданные.
  reviewPrompt: Просмотрев официальную страницу, вернитесь на рабочий стол и подтвердите свое согласие.
  effectiveDate: Дата вступления в силу
  revision: Редакция
  openInBrowser: Открыть {{title}} в браузере
  checkbox: Я ознакомился с текущим Лицензионным соглашением и Политикой конфиденциальности в браузере и согласен с ними.
  modeHintFull: После принятия установка продолжает совместное ускорение и загрузку.
  modeHintLegalOnly: После принятия шлюз закрывается и возобновляется основной интерфейс; при отклонении происходит выход из текущего сеанса приложения.
  accept: Принять и продолжить
  accepting: Запись о приеме...
  decline: Отказ и выход
  declining: Выход...
  refresh: Обновить юридические метаданные
  metadata:
    remote: Загружены последние юридические метаданные
    cache: Использование последних успешных кэшированных юридических метаданных
    unavailable: Юридические метаданные в настоящее время недоступны.
