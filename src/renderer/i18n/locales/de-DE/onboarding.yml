title: Erstmalige Einrichtung
welcome:
  title: Willkommen bei Hagicode Desktop
  description: Hagicode Desktop ist der lokale Launcher für Hagicode. Wir werden die Ersteinrichtung und die Konformitätsbestätigung in {{count}} Schritten abschließen.
  features:
    manage:
      title: Versionsverwaltung
      description: Verwalten Sie Hagicode Server Installationen und Updates
    monitor:
      title: Serviceüberwachung
      description: Starten, stoppen und überwachen Sie den Servicestatus
    dependencies:
      title: Abhängigkeitsmanagement
      description: Systemabhängigkeiten anzeigen und verwalten
  processTitle: 'Die Ersteinrichtung besteht aus {{count}} Schritten:'
  steps:
    welcome: Überprüfen Sie die Einrichtung und was als nächstes passieren wird
    download: Laden Sie das neueste Hagicode Server-Paket herunter
    launch: Starten Sie den Dienst und bestätigen Sie, dass er ausgeführt wird
    dependencyPreparation: Bestätigen Sie, dass die erforderlichen Abhängigkeiten vorhanden sind und die Agent CLI-Pakete bereit sind
    sharingAcceleration: Bestätigen Sie, ob die gemeinsame Beschleunigung standardmäßig aktiviert bleiben soll
    legalConsent: Bestätigen Sie die aktuellen Überarbeitungen der EULA und der Datenschutzrichtlinie und überprüfen Sie dann die offiziellen Seiten in Ihrem Browser
    languageSelection: Zuerst die Desktop-Sprache für die Einrichtung auswählen
  skip: Einrichtung überspringen
  start: Legen Sie los
