sharingAcceleration:
  title: Download- und Sharing-Beschleunigung
  description: Standardmäßig aktiviert. Neueste Desktop-/Server-Assets mit Torrent-Metadaten beginnen zuerst beim Torrent und greifen automatisch zurück.
  toggleTitle: LAN-/Internet-Sharing-Beschleunigung aktivieren (Standard)
  toggleDescription: Sie können es hier zunächst deaktivieren und später in den Einstellungen anpassen.
  bullets:
    latest: Das externe Seeding konzentriert sich weiterhin auf die neuesten Desktop- und Serverressourcen
    fallback: Wenn der Torrent-Sidecar fehlt oder der Handshake fehlschlägt, wird der Fallback-Backfill automatisch gestartet
    disable: Deaktivieren Sie es jetzt, wenn Ihr Netzwerk eingeschränkt ist oder Sie keine Freigabe wünschen
    portable: Der tragbare Modus erzwingt die Deaktivierung dieser Funktion und führt niemals ein implizites Seeding durch
dependencyPreparation:
  title: Abhängigkeiten vorbereiten
  description: Installieren Sie die für HagiCode Desktop erforderlichen Befehlszeilenabhängigkeiten und wählen Sie mindestens einen Agent CLI zur Verwendung mit Codierungssitzungen aus.
  loading: Vom Desktop verwaltete Abhängigkeiten werden überprüft...
  environment:
    title: Desktop-verwaltete Node/npm-Umgebung
    description: Desktop installiert und überprüft verwaltete CLI-Pakete in seiner eigenen Node/npm-Umgebung. Lesen Sie die FAQ für aktuelle Pfad-, Paket- und Fehlerbehebungsdetails.
    faqLinkLabel: Häufig gestellte Fragen zur Knotenumgebung anzeigen
    faqUrl: https://docs.hagicode.com/en/faq/desktop-node-environment/
  required:
    title: Erforderliche Abhängigkeiten
    description: Diese Abhängigkeiten müssen installiert werden, bevor das Setup fortgesetzt werden kann.
  optional:
    title: Optionale Abhängigkeiten
    description: Optionale Abhängigkeiten blockieren die Einrichtung nicht.
  agentCli:
    title: Auswahl des Agenten CLI
    description: Wählen Sie mindestens einen Agenten CLI aus. Das ausgewählte CLI muss in der verwalteten npm-Umgebung von Desktop installiert werden.
  blocking:
    environment-unavailable:
      title: Knoten/npm-Umgebung nicht verfügbar
      description: Der Desktop kann nicht auf seine verwaltete Knoten-/npm-Umgebung zugreifen. Aktualisieren Sie, nachdem die Toolchain verfügbar ist, oder öffnen Sie die FAQ zur Knotenumgebung, um Details zur Fehlerbehebung zu erhalten.
    required-packages-missing:
      title: Erforderliche Abhängigkeiten fehlen
      description: Installieren Sie die fehlenden erforderlichen Abhängigkeiten, bevor Sie fortfahren.
    agent-cli-not-selected:
      title: Wählen Sie einen Agenten CLI
      description: Wählen Sie mindestens eine unterstützte Agent CLI-Abhängigkeit aus.
    agent-cli-not-installed:
      title: Der ausgewählte Agent CLI ist nicht installiert
      description: Installieren Sie mindestens ein ausgewähltes Agent CLI-Paket in der verwalteten npm-Umgebung von Desktop.
  actions:
    install: Bestätigen und installieren
    refresh: Aktualisieren
    retry: Versuchen Sie es noch einmal
    recheck: Überprüfen Sie es noch einmal
  complete:
    title: Abhängigkeiten sind fertig
    description: Erforderliche Abhängigkeiten sind installiert und mindestens ein ausgewählter Agent CLI ist bereit.
  error:
    title: Die Vorbereitung der Abhängigkeit ist fehlgeschlagen
legal:
  title: Endbenutzer-Lizenzvereinbarung und Datenschutzrichtlinie
  descriptionFull: Bestätigen Sie vor dem Herunterladen des HagiCode-Servers die aktuellen Überarbeitungen der EULA und der Datenschutzrichtlinie. Die offiziellen Dokumente werden in Ihrem Standardbrowser geöffnet.
  descriptionLegalOnly: Die aktuellen Gesetzesänderungen wurden noch nicht übernommen. Überprüfen Sie die offiziellen Dokumente in Ihrem Standardbrowser und kehren Sie dann zur Bestätigung zum Desktop zurück.
  progressFull: 'Vollständige Einrichtung: {{steps}}'
  progressLegalOnly: 'Compliance-Gate-Modus: Vor der aktuellen rechtlichen Einwilligung wird zuerst die Sprachauswahl angezeigt'
  browserInstruction: Öffnen Sie die offiziellen Dokumente in Ihrem Standardbrowser, bevor Sie sie akzeptieren. Desktop zeigt nur die Revisionszusammenfassung an, nicht den vollständigen Gesetzestext.
  cacheHint: Sie sehen derzeit die letzte erfolgreich zwischengespeicherte rechtliche Zusammenfassung. Aktualisieren Sie nach der Netzwerkwiederherstellung, um zu bestätigen, ob eine neuere Revision vorhanden ist.
  unavailableHint: Die Zusammenfassung der Rechtsrevision ist nicht verfügbar und es ist noch keine zwischengespeicherte Kopie verfügbar. Überprüfen Sie Ihr Netzwerk und versuchen Sie es erneut. Das Setup kann erst fortgesetzt werden, wenn gültige Metadaten geladen sind.
  reviewPrompt: Nachdem Sie die offizielle Seite überprüft haben, kehren Sie zum Desktop zurück und bestätigen Sie Ihre Zustimmung.
  effectiveDate: Datum des Inkrafttretens
  revision: Überarbeitung
  openInBrowser: Öffnen Sie {{title}} im Browser
  checkbox: Ich habe die aktuelle EULA und Datenschutzrichtlinie im Browser gelesen und bin damit einverstanden.
  modeHintFull: Nach der Annahme fährt das Setup mit der gemeinsamen Beschleunigung und dem Download fort.
  modeHintLegalOnly: Nach der Annahme schließt sich das Tor und die Hauptschnittstelle wird fortgesetzt. Ablehnen beendet die aktuelle App-Sitzung.
  accept: Akzeptieren und fortfahren
  accepting: Abnahme protokollieren...
  decline: Ablehnen und beenden
  declining: Verlassen...
  refresh: Rechtliche Metadaten aktualisieren
  metadata:
    remote: Neueste rechtliche Metadaten geladen
    cache: Verwendung der letzten erfolgreich zwischengespeicherten rechtlichen Metadaten
    unavailable: Rechtliche Metadaten sind derzeit nicht verfügbar
  types:
    eula: EULA
    privacy-policy: Datenschutzrichtlinie
languageSelection:
  title: Sprache auswählen
  description: Wählen Sie zuerst die Sprache für Hagicode Desktop. Beim ersten Start des eingebetteten Backends wird ein passender Standard verwendet.
  recommended: Empfohlen
  selected: Ausgewählt
  choose: Diese Sprache wählen
  error: Die ausgewählte Sprache konnte noch nicht gespeichert werden. Bitte erneut versuchen.
