turboEngine:
  eyebrow: Unbefristete Microsoft Store-Lizenz
  loadingTitle: TurboEngine-Status wird geladen
  loading: Der aktuelle TurboEngine-Snapshot wird geladen...
  verifyingTitle: Startprüfung läuft
  verifyingDescription: Desktop prüft Microsoft Store beim Start live, damit zwischengespeicherte TurboEngine-Daten nicht als endgültiger Stand erhalten bleiben.
  verifyingBadge: Wird geprüft
  staleBadge: Zwischengespeicherter Snapshot
  errorTitle: TurboEngine-Snapshot nicht verfügbar
  errorDescription: 'Desktop konnte den TurboEngine-Snapshot nicht laden: {{error}}'
  hero:
    title: TurboEngine workspace
    activeDescription: TurboEngine is already licensed on this device. You can confirm the current Microsoft Store state, review diagnostics, and refresh whenever needed.
    inactiveDescription: TurboEngine uses a separate perpetual Microsoft Store license. This workspace lets you verify the current state, buy the license, and confirm the latest runtime diagnostics.
  article:
    unlockTitle: Einmal kaufen, dauerhaft freischalten
    unlockLead: Das TurboEngine-DLC bündelt hohe Vorschlagsparallelität, Branding-Anpassung, erweiterte Themen und Avatar-Ressourcen in einem dauerhaften Freischaltpaket. Nach dem Kauf ist kein Abo nötig, und die Funktionen wirken sich direkt auf Ihre aktuelle Workbench aus.
    featuresTitle: Wichtigste Freischaltungen
    purchaseNoticeTitle: Hinweise zum Kauf
    purchaseNoticeItems:
      channel: Lizenzberechtigungen sind zwischen verschiedenen Vertriebskanälen nicht übertragbar. Eine im Microsoft Store gekaufte Lizenz funktioniert zum Beispiel nur mit der Microsoft-Store-Edition.
      restart: Nach dem Kauf wird die Berechtigung möglicherweise nicht sofort aktiv. Starten Sie den Hagicode-Dienst und Desktop neu; falls nötig, starten Sie zusätzlich den Computer neu.
      online: Diese Berechtigung unterstützt keine Offline-Nutzung. Stellen Sie sicher, dass der Computer beim Start von Desktop ordnungsgemäß mit dem Internet verbunden ist.
    features:
      proposalConcurrency:
        title: Vorschlagsparallelität steigt von 3 auf 32
        description: Das ist weiterhin das zentrale TurboEngine-DLC-Upgrade mit der stärksten Alltagswirkung. Vorschläge in Generierung, Ausführung und Archiv belegen gemeinsam Parallelitätsplätze, daher entscheidet die höhere Obergrenze direkt darüber, ob mehrere Aufgabenstränge stabil parallel laufen können.
      documentThemes:
        title: Erweiterte Dokumentthemen
        description: In der Agent-Verwaltung können Sie zwischen erweiterten Document-Theme-Optionen wechseln und in Echtzeit sehen, wie Workbench, Verlauf und Fallback-Gruppierungen mit anderer Terminologie und anderem Wording wirken.
      composeCommitCoAuthor:
        title: Eigenes Co-Authored-By für AI Compose Commit
        description: In den Git-Einstellungen können Sie einen Standardmodus für Co-Authored-By speichern. In einem einzelnen AI-Compose-Lauf können Sie außerdem vorübergehend einen benutzerdefinierten Mitautor mit Name und E-Mail setzen oder den Footer für diese Runde ganz weglassen.
      branding:
        title: Markenanpassung
        description: Sobald das TurboEngine-DLC aktiv ist, können Sie ein Header-Logo hochladen und App-Titel, Browser-Titel sowie den Markenlink konfigurieren. Es geht also nicht nur um ein neues Symbol oben links, sondern um die komplette Markenfläche im Kopf der Workbench.
      avatarUpload:
        title: Eigene Avatare hochladen und gemeinsam wiederverwenden
        description: Sie können jetzt einen benutzerdefinierten Avatar für den aktuellen Agenten hochladen. Außerdem lässt sich eine gemeinsame Bibliothek benutzerdefinierter Avatare in Erstellen-, Bearbeiten- und Batch-Anlegen-Abläufen wiederverwenden.
      avatarPacks:
        title: Mehr Avatar-Ressourcen
        description: Fünf neue integrierte Agent-Avatar-Sets sind enthalten.
