settings:
  title: Einstellungen
  tabs:
    onboarding: Onboarding
    sharingAcceleration: Herunterladen und Teilen
    updates: Hintergrundaktualisierungen
    dependencyManagement: Dependency Management
    debugOptions: Debug Options
    runtimeData: Runtime Data
  dependencyManagementMode:
    title: Dependency management mode
    description: Choose whether Desktop manages CLI dependencies itself or only inspects the current global Node/npm environment.
    effectiveMode: 'Effective mode: {{mode}}'
    options:
      internal:
        label: Internal (Desktop-managed)
        description: Desktop uses its bundled Node/npm toolchain and allows install, uninstall, and batch sync operations.
      external:
        label: External (read-only)
        description: Desktop inspects the current global Node/npm environment without changing packages or overriding npm prefixes.
    messages:
      saveSuccess: Dependency management mode saved
      saveFailed: Failed to save dependency management mode
    errors:
      saveErrorDetail: 'Save failed: {{error}}'
  smartConfig:
    title: Smart Config-Eingabeaufforderung
    description: Überprüfen Sie die gelöste Eingabeaufforderung, kopieren Sie sie in ein beliebiges unterstütztes AI CLI und schließen Sie den Konfigurationsablauf manuell ab.
  onboarding:
    title: Onboarding
    description: Führen Sie den Ersteinrichtungsassistenten erneut aus, um Pakete herunterzuladen, Abhängigkeiten zu installieren und den Dienst zu starten.
    restartWizard: Neustart-Assistent
    restartWizardDescription: Führen Sie den Ersteinrichtungsassistenten erneut aus, um Pakete herunterzuladen, Abhängigkeiten zu installieren und den Dienst zu starten.
    restartButton: Neustart-Assistent
    resetting: Zurücksetzen...
    resetSuccess: Der Assistent wurde zurückgesetzt
    resetError: 'Zurücksetzen fehlgeschlagen: {{error}}'
    homepageTour:
      title: Homepage-Tour zurücksetzen
      description: Löschen Sie den Abschlussstatus der Homepage-Tour, damit die geführte Komplettlösung beim nächsten Öffnen der Systemverwaltung erneut automatisch abgespielt werden kann.
      resetButton: Homepage-Tour zurücksetzen
      resetting: Tour wird zurückgesetzt...
      resetSuccess: Homepage-Tour wurde zurückgesetzt
      resetError: 'Homepage-Tour konnte nicht zurückgesetzt werden: {{error}}'
  sharingAcceleration:
    title: Download- und Sharing-Beschleunigung
    description: Verwalten Sie Torrent-First-Downloads, vertrauenswürdige Cache-Wiederverwendung und automatisches Fallback-Verhalten.
    enabledTitle: Aktivieren Sie die LAN-/Internet-Sharing-Beschleunigung
    enabledDescription: Jedes Asset mit Torrent-Metadaten startet zuerst beim Torrent und greift bei Bedarf automatisch zurück.
    uploadLimit: Upload-Limit (Mbps)
    cacheLimit: Cache-Limit (GiB)
    retentionDays: Aufbewahrungstage
    thresholdHint: Assets mit Torrent-Metadaten unterliegen nicht mehr dem alten Schwellenwert von 100 MB.
    networkHint: Deaktivieren Sie die Freigabebeschleunigung in eingeschränkten Netzwerken. Der tragbare Modus erzwingt immer die Deaktivierung.
    portableModeHint: Der tragbare Modus deaktiviert die Freigabebeschleunigung und das externe Seeding und hält die Downloads dann auf HTTP/WebSeed Fallback.
    save: Einstellungen speichern
    saving: Sparen...
    saveSuccess: Freigabebeschleunigungseinstellungen gespeichert
    saveError: Die Einstellungen für die Freigabebeschleunigung konnten nicht gespeichert werden
    loadError: Die Einstellungen für die Freigabebeschleunigung konnten nicht geladen werden
    modeHint: 'Modus: Torrent zuerst, automatischer Fallback bei Fehler.'
    scopeHint: 'Das externe Seeding konzentriert sich weiterhin auf den neuesten Desktop und den neuesten Server. Standard-Cache-Limit: 5 GiB.'
  updates:
    title: Hintergrundaktualisierungen
    description: Verwalten Sie automatische Prüfungen, Vorab-Downloads im Hintergrund und überprüfte Archivaufbewahrung.
    managedInstall:
      title: Auto-updates are disabled
      description: The application does not update itself automatically. How updates are delivered depends on the channel you used to install it, such as Windows Store or Steam.
    enabled:
      label: Aktivieren Sie Hintergrund-Predownloads
      description: Wenn eine kompatible neuere Version gefunden wird, laden Sie das Archiv im Hintergrund herunter, ohne die aktuelle Laufzeit zu wechseln.
    retainedArchiveCount:
      label: Anzahl der beibehaltenen Archive
      description: Es werden nur verifizierte automatisch heruntergeladene Archive aufbewahrt. Bei Überschreitung des Limits werden ältere Einträge entfernt.
    actions:
      save: Einstellungen speichern
      saving: Sparen...
      cancel: Abbrechen
    messages:
      saveSuccess: Hintergrundaktualisierungseinstellungen gespeichert
      saveFailed: Die Einstellungen für die Hintergrundaktualisierung konnten nicht gespeichert werden
    errors:
      retainedArchiveCountPositive: Die Anzahl der beibehaltenen Archive muss eine positive Ganzzahl sein.
      saveErrorDetail: 'Speichern fehlgeschlagen: {{error}}'
    notes:
      snapshotModel: Die Dashboard-Erinnerung wird durch einen persistenten Hauptprozess-Snapshot gesteuert, sodass der letzte bekannte Aktualisierungsstatus auch nach dem Neuladen des Desktops erhalten bleibt.
      retentionPolicy: Bei der Aufbewahrungsbereinigung werden nur zwischengespeicherte Archive und Metadaten entfernt. Installierte Versionsverzeichnisse bleiben unberührt.
  runtimeDataPath:
    title: Runtime data storage path
    description: Choose where Desktop stores runtime-managed files, PM2 state, logs, and other runtime data.
    activePreset: 'Current effective preset: {{preset}}'
    environmentOverrideBadge: Environment override active
    lockedByRuntime: Locked by Windows Store
    paths:
      configuredRoot: 'Configured root: {{path}}'
      effectiveRoot: 'Effective root: {{path}}'
      environmentOverride: 'Environment override root: {{path}}'
    options:
      userData-runtime-data:
        label: userData/runtime-data (default)
        description: Stores runtime data under the Desktop Electron userData directory. Best for the default single-machine setup.
      home-runtime-data:
        label: ~/.hagicode/runtime-data
        description: Stores runtime data under the current user home directory. Best for deployments that need a stable shared path.
    warnings:
      noMigration: Changing this setting only updates the target path. Desktop does not migrate existing runtime data automatically.
      restart: Saving a changed preset stops and starts managed PM2 services so the new runtime data root takes effect immediately.
    actions:
      save: Save Changes
      saving: Saving...
      cancel: Cancel
    messages:
      unchanged: Runtime data path is already using this preset
      saveSuccess: Runtime data path saved
      restartSuccess: Runtime data path saved and managed services restarted
      saveFailed: Failed to save runtime data path
    errors:
      saveErrorDetail: 'Save failed: {{error}}'
  debugOptions:
    title: Debug Options
    description: Control Desktop-managed npm behaviors for diagnosing package installation issues.
    useIgnoreScriptsForManagedNpm:
      label: npm uses `--ignore-scripts`
      description: Make Desktop-managed npm installs and sync operations skip lifecycle scripts so postinstall-related failures are easier to isolate.
    notes:
      scope: This setting only affects future Desktop-managed npm installs and sync operations.
      npm: The npm switch only affects future Desktop-managed npm installs and sync operations. Saving it takes effect immediately and does not restart the managed service.
    actions:
      save: Save Changes
      saving: Saving...
      cancel: Cancel
    messages:
      unchanged: Debug options are already using these values
      saveSuccess: Debug options saved
      saveFailed: Failed to save debug options
    errors:
      saveErrorDetail: 'Save failed: {{error}}'
