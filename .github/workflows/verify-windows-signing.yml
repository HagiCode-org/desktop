name: Verify Windows Signing

on:
  push:
    branches:
      - verify/windows-signing
    tags:
      - 'verify-win-signing-v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  HAGISCRIPT_VERSION: 'latest'
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

jobs:
  verify-windows-signing:
    name: Verify signed Windows MSIX
    runs-on: windows-2022
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Artifact Signing configuration
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CODESIGN_ENDPOINT: ${{ secrets.AZURE_CODESIGN_ENDPOINT }}
          AZURE_CODESIGN_ACCOUNT_NAME: ${{ secrets.AZURE_CODESIGN_ACCOUNT_NAME }}
          AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME }}
          AZURE_CODESIGN_APPX_PUBLISHER: ${{ secrets.AZURE_CODESIGN_APPX_PUBLISHER }}
        run: |
          missing=()
          for key in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_CODESIGN_ENDPOINT AZURE_CODESIGN_ACCOUNT_NAME AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME AZURE_CODESIGN_APPX_PUBLISHER; do
            if [ -z "${!key:-}" ]; then
              missing+=("${key}")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            printf '::error::Missing Artifact Signing configuration: %s\n' "$(IFS=', '; echo "${missing[*]}")"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install global hagiscript
        shell: bash
        run: |
          npm install --global "@hagicode/hagiscript@${HAGISCRIPT_VERSION}"
          prefix="$(npm config get prefix)"
          echo "$prefix" >> "$GITHUB_PATH"
          if [ -d "$prefix/bin" ]; then
            echo "$prefix/bin" >> "$GITHUB_PATH"
          fi
          hash -r
          hagiscript --version

      - name: Cache build downloads
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
            build/embedded-runtime/downloads
            build/embedded-node-runtime/downloads
            .generated/code-server-runtime/downloads
            .generated/omniroute-runtime/downloads
          key: ${{ runner.os }}-verify-windows-signing-${{ hashFiles('package-lock.json', 'resources/manifest.yml') }}
          restore-keys: |
            ${{ runner.os }}-verify-windows-signing-
            ${{ runner.os }}-build-downloads-

      - name: Sync version from verification tag
        if: startsWith(github.ref, 'refs/tags/verify-win-signing-v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#verify-win-signing-v}"
          echo "Syncing npm/package.json version to ${VERSION}"
          npm version "${VERSION}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build Windows MSIX verification artifact
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAGICODE_EMBEDDED_DOTNET_PLATFORM: win-x64
          AZURE_CODESIGN_APPX_PUBLISHER: ${{ secrets.AZURE_CODESIGN_APPX_PUBLISHER }}
        run: |
          npm run build:msix:verify

      - name: Collect MSIX artifacts and assert output scope
        id: msix_artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pkgDir = Join-Path $env:GITHUB_WORKSPACE 'pkg'
          if (-not (Test-Path $pkgDir)) {
            throw "pkg directory not found: $pkgDir"
          }

          $allFiles = Get-ChildItem -Path $pkgDir -File
          $msix = @($allFiles | Where-Object { $_.Extension -ieq '.msix' } | Sort-Object FullName -Unique)
          $unexpected = @($allFiles | Where-Object { $_.Extension -in @('.exe', '.appx') } | Sort-Object FullName -Unique)

          if ($msix.Count -eq 0) {
            throw 'No Windows MSIX artifact was found in pkg/.'
          }

          if ($unexpected.Count -gt 0) {
            $paths = ($unexpected | ForEach-Object { $_.FullName }) -join [Environment]::NewLine
            throw "The verification workflow should only emit MSIX artifacts, but found unexpected outputs:`n$paths"
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value 'msix_files<<EOF'
          foreach ($file in $msix) {
            Add-Content -Path $env:GITHUB_OUTPUT -Value $file.FullName
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value 'EOF'
          Add-Content -Path $env:GITHUB_OUTPUT -Value "msix_count=$($msix.Count)"

      - name: Verify MSIX distribution mode remains normal
        shell: bash
        env:
          WINDOWS_MSIX_FILES: ${{ steps.msix_artifacts.outputs.msix_files }}
        run: |
          set -euo pipefail
          mapfile -t msix_files < <(printf '%s\n' "$WINDOWS_MSIX_FILES" | sed '/^[[:space:]]*$/d')
          if [ "${#msix_files[@]}" -eq 0 ]; then
            echo '::error::MSIX verification did not receive any package paths.'
            exit 1
          fi

          node scripts/verify-msix-package-mode.js --mode normal "${msix_files[@]}"

      - name: Azure login for Artifact Signing
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows MSIX with Artifact Signing
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ secrets.AZURE_CODESIGN_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_CODESIGN_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}/pkg
          files-folder-filter: '*.msix'
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Hagicode Desktop
          description-url: https://github.com/HagiCode-org/desktop
          timeout: 600

      - name: Verify signed Windows MSIX artifacts
        shell: bash
        env:
          VERIFY_STRICT: 'true'
          WINDOWS_MSIX_FILES: ${{ steps.msix_artifacts.outputs.msix_files }}
        run: |
          set -euo pipefail
          mapfile -t msix_files < <(printf '%s\n' "$WINDOWS_MSIX_FILES" | sed '/^[[:space:]]*$/d')
          if [ "${#msix_files[@]}" -eq 0 ]; then
            echo '::error::MSIX signature verification did not receive any package paths.'
            exit 1
          fi

          for file in "${msix_files[@]}"; do
            node scripts/verify-signature.js "$file"
          done

      - name: Upload signed Windows MSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verify-windows-signing-${{ github.sha }}
          path: |
            ${{ steps.msix_artifacts.outputs.msix_files }}
            ${{ github.workspace }}/electron-builder.msix-verification.yml
          retention-days: 14
          if-no-files-found: error

      - name: Summarize signed Windows verification
        shell: bash
        run: |
          {
            echo '## Windows signing verification completed'
            echo
            echo '- Branch trigger: verify/windows-signing'
            echo '- Artifact scope: direct MSIX only'
            echo '- Distribution mode assertion: normal'
            echo '- Signed MSIX artifacts: ${{ steps.msix_artifacts.outputs.msix_count }}'
            echo '- Verification: passed'
          } >> "$GITHUB_STEP_SUMMARY"
