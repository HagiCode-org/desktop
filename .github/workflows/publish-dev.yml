name: Publish Dev Build

on:
  push:
    branches:
      - publish
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  HAGISCRIPT_VERSION: 'latest'
  PUBLISH_BASE_VERSION: '0.0.1'
  RELEASE_CHANNEL: 'dev'
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

jobs:
  prepare-release:
    name: Prepare Dev Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      channel: ${{ steps.meta.outputs.channel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute dev release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${PUBLISH_BASE_VERSION}-dev.${GITHUB_RUN_NUMBER}"
          RELEASE_TAG="V${VERSION}"
          RELEASE_NAME="Publish Dev ${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "channel=${RELEASE_CHANNEL}" >> "$GITHUB_OUTPUT"

          {
            echo '## Publish dev release prepared'
            echo
            echo "- Version: ${VERSION}"
            echo "- Release tag: ${RELEASE_TAG}"
            echo "- Release channel: ${RELEASE_CHANNEL}"
            echo "- Commit: ${GITHUB_SHA}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
        run: |
          set -euo pipefail
          NOTES_FILE="$(mktemp)"
          cat > "$NOTES_FILE" <<NOTES
          Automated publish branch prerelease.

          - Branch: ${GITHUB_REF_NAME}
          - Commit: ${GITHUB_SHA}
          - Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          NOTES

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Updating existing prerelease ${RELEASE_TAG}"
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_NAME" \
              --prerelease
          else
            echo "Creating prerelease ${RELEASE_TAG}"
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_NAME" \
              --prerelease \
              --latest=false \
              --notes-file "$NOTES_FILE"
          fi

  build-windows:
    name: Build Windows Dev Assets (${{ matrix.target.name }})
    runs-on: windows-2022
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: portable
            name: Portable
            builder_target: portable
            report_suffix: portable
            requires_zip: true
          - id: nsis
            name: NSIS
            builder_target: nsis
            report_suffix: nsis
            requires_zip: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install global hagiscript
        shell: bash
        run: |
          npm install --global "@hagicode/hagiscript@${HAGISCRIPT_VERSION}"
          prefix="$(npm config get prefix)"
          echo "$prefix" >> "$GITHUB_PATH"
          if [ -d "$prefix/bin" ]; then
            echo "$prefix/bin" >> "$GITHUB_PATH"
          fi
          hash -r
          hagiscript --version

      - name: Cache build downloads
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
            build/embedded-runtime/downloads
            build/embedded-node-runtime/downloads
            .generated/code-server-runtime/downloads
            .generated/omniroute-runtime/downloads
          key: ${{ runner.os }}-build-downloads-${{ hashFiles('package-lock.json', 'resources/manifest.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-downloads-

      - name: Sync package version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare-release.outputs.version }}"
          echo "Syncing npm/package.json version to ${VERSION}"
          npm version "${VERSION}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build for Windows
        shell: bash
        run: node scripts/ci-build.js --platform win --target "${{ matrix.target.builder_target }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAGICODE_EMBEDDED_DOTNET_PLATFORM: win-x64

      - name: Collect Windows artifacts
        id: windows_artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pkgDir = Join-Path $env:GITHUB_WORKSPACE 'pkg'
          if (-not (Test-Path $pkgDir)) {
            throw "pkg directory not found: $pkgDir"
          }

          $allFiles = Get-ChildItem -Path $pkgDir -File
          $nsis = @($allFiles | Where-Object { $_.Extension -ieq '.exe' -and $_.Name -like '*Setup*' } | Sort-Object FullName -Unique)
          $portable = @($allFiles | Where-Object { $_.Extension -ieq '.exe' -and $_.Name -notlike '*Setup*' } | Sort-Object FullName -Unique)
          $selectedFiles = if ('${{ matrix.target.id }}' -eq 'portable') { $portable } else { $nsis }
          $unpackedRoots = @(Get-ChildItem -Path $pkgDir -Directory | Where-Object { $_.Name -eq 'win-unpacked' } | Sort-Object FullName -Unique)
          $buildReport = Join-Path $pkgDir 'ci-build-report-win-${{ matrix.target.report_suffix }}.json'

          if ($selectedFiles.Count -eq 0) {
            throw "No Windows ${{ matrix.target.name }} EXE artifacts were found in pkg/ for prerelease publication."
          }

          if ('${{ matrix.target.id }}' -eq 'portable' -and $unpackedRoots.Count -eq 0) {
            throw 'No win-unpacked directory was found in pkg/ for ZIP assembly.'
          }

          if (-not (Test-Path $buildReport)) {
            throw "CI build report was not found: $buildReport"
          }

          $zipPayloadRoot = Join-Path $pkgDir 'windows-zip-payload'
          $zipBaseName = [System.IO.Path]::GetFileNameWithoutExtension($selectedFiles[0].Name)

          function Write-MultilineOutput([string]$Name, [object[]]$Files) {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "$Name<<EOF"
            foreach ($file in $Files) {
              Add-Content -Path $env:GITHUB_OUTPUT -Value $file.FullName
            }
            Add-Content -Path $env:GITHUB_OUTPUT -Value 'EOF'
          }

          Write-MultilineOutput 'package_files' $selectedFiles
          Write-MultilineOutput 'unpacked_roots' $unpackedRoots
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_payload_root=$zipPayloadRoot"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_base_name=$zipBaseName"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "package_count=$($selectedFiles.Count)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "unpacked_count=$($unpackedRoots.Count)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "report_path=$buildReport"

      - name: Prepare Windows unpacked ZIP payload workspace
        if: success() && matrix.target.requires_zip
        id: windows_zip_payload
        shell: pwsh
        env:
          WINDOWS_UNPACKED_ROOTS: ${{ steps.windows_artifacts.outputs.unpacked_roots }}
          WINDOWS_ZIP_BASE_NAME: ${{ steps.windows_artifacts.outputs.zip_base_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $zipPayloadRoot = '${{ steps.windows_artifacts.outputs.zip_payload_root }}'

          if (Test-Path $zipPayloadRoot) {
            Remove-Item -Path $zipPayloadRoot -Recurse -Force
          }
          New-Item -Path $zipPayloadRoot -ItemType Directory -Force | Out-Null

          $unpackedRoots = @()
          $env:WINDOWS_UNPACKED_ROOTS -split "`r?`n" | ForEach-Object {
            $trimmed = $_.Trim()
            if ($trimmed) {
              $unpackedRoots += $trimmed
            }
          }

          if ($unpackedRoots.Count -eq 0) {
            throw 'No unpacked Windows roots were passed to ZIP payload staging.'
          }

          $payloadDirName = "{0}-unpacked" -f $env:WINDOWS_ZIP_BASE_NAME
          $payloadDir = Join-Path $zipPayloadRoot $payloadDirName
          New-Item -Path $payloadDir -ItemType Directory -Force | Out-Null

          foreach ($unpackedRootPath in $unpackedRoots) {
            $unpackedRoot = Get-Item -LiteralPath $unpackedRootPath
            Get-ChildItem -LiteralPath $unpackedRoot.FullName -Force | ForEach-Object {
              $targetPath = Join-Path $payloadDir $_.Name
              if ($_.PSIsContainer) {
                Copy-Item -LiteralPath $_.FullName -Destination $targetPath -Recurse -Force
              } else {
                Copy-Item -LiteralPath $_.FullName -Destination $targetPath -Force
              }
            }
          }

          $zipPayloadFiles = @(Get-ChildItem -LiteralPath $payloadDir -Recurse -File | Sort-Object FullName)
          if ($zipPayloadFiles.Count -eq 0) {
            throw 'Windows ZIP payload staging did not produce any files.'
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "payload_dir=$payloadDir"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "payload_dir_name=$payloadDirName"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_payload_count=$($zipPayloadFiles.Count)"

      - name: Create Windows ZIP artifact
        if: success() && matrix.target.requires_zip
        id: windows_zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pkgDir = Join-Path $env:GITHUB_WORKSPACE 'pkg'
          $payloadDir = '${{ steps.windows_zip_payload.outputs.payload_dir }}'
          $payloadDirName = '${{ steps.windows_zip_payload.outputs.payload_dir_name }}'
          if (-not (Test-Path $payloadDir)) {
            throw "Windows ZIP payload directory not found: $payloadDir"
          }

          $zipPath = Join-Path $pkgDir ("{0}.zip" -f $payloadDirName)
          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $payloadDir '*') -DestinationPath $zipPath -CompressionLevel Optimal
          $zipFile = Get-Item -LiteralPath $zipPath

          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_files<<EOF"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $zipFile.FullName
          Add-Content -Path $env:GITHUB_OUTPUT -Value 'EOF'
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_path=$($zipFile.FullName)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value 'zip_count=1'

      - name: Verify Windows ZIP toolchain payload
        if: success() && matrix.target.requires_zip && steps.windows_zip.outputs.zip_path != ''
        shell: bash
        run: |
          node scripts/verify-release-archives.js --archive "${{ steps.windows_zip.outputs.zip_path }}"

      - name: Summarize Windows packaging
        if: success()
        shell: bash
        run: |
          {
            echo '## Windows packaging'
            echo
            echo '- Package target: ${{ matrix.target.name }}'
            echo '- Package artifacts discovered: ${{ steps.windows_artifacts.outputs.package_count }}'
            echo '- Unpacked roots discovered: ${{ steps.windows_artifacts.outputs.unpacked_count }}'
            echo '- ZIP payload files staged: ${{ steps.windows_zip_payload.outputs.zip_payload_count || '' }}'
            echo '- ZIP artifacts created: ${{ steps.windows_zip.outputs.zip_count || '' }}'
            echo '- CI build report: `${{ steps.windows_artifacts.outputs.report_path }}`'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Windows release bundle
        uses: actions/upload-artifact@v4
        with:
          name: dev-release-windows-${{ matrix.target.id }}
          path: |
            ${{ steps.windows_artifacts.outputs.package_files }}
            ${{ steps.windows_zip.outputs.zip_files }}
            ${{ steps.windows_artifacts.outputs.report_path }}
          retention-days: 14
          if-no-files-found: error

  publish-windows:
    name: Publish Windows Dev Assets
    needs:
      - prepare-release
      - build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows release bundle
        uses: actions/download-artifact@v4
        with:
          pattern: dev-release-windows-*
          merge-multiple: true
          path: release-assets/windows

      - name: Upload Windows assets to prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          name: ${{ needs.prepare-release.outputs.release_name }}
          draft: 'false'
          prerelease: 'true'
          overwrite_files: 'true'
          files: |
            release-assets/windows/**/*.exe
            release-assets/windows/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-platform-assets:
    name: Build ${{ matrix.target.name }} Dev Assets
    runs-on: ${{ matrix.target.runs_on }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: linux-appimage
            name: Linux AppImage
            runs_on: ubuntu-latest
            builder_target: AppImage
            report_suffix: appimage
            artifact_glob: '*.AppImage'
          - id: linux-tar-gz
            name: Linux tar.gz
            runs_on: ubuntu-latest
            builder_target: tar.gz
            report_suffix: tar-gz
            artifact_glob: '*.tar.gz'
          - id: linux-zip
            name: Linux ZIP
            runs_on: ubuntu-latest
            builder_target: zip
            report_suffix: zip
            artifact_glob: '*.zip'
          - id: macos-x64
            name: macOS (x64)
            runs_on: macos-latest
            mac_arch: x64
          - id: macos-arm64
            name: macOS (arm64)
            runs_on: macos-latest
            mac_arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install global hagiscript
        shell: bash
        run: |
          npm install --global "@hagicode/hagiscript@${HAGISCRIPT_VERSION}"
          prefix="$(npm config get prefix)"
          echo "$prefix" >> "$GITHUB_PATH"
          if [ -d "$prefix/bin" ]; then
            echo "$prefix/bin" >> "$GITHUB_PATH"
          fi
          hash -r
          hagiscript --version

      - name: Cache build downloads
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
            build/embedded-runtime/downloads
            build/embedded-node-runtime/downloads
            .generated/code-server-runtime/downloads
            .generated/omniroute-runtime/downloads
          key: ${{ runner.os }}-build-downloads-${{ hashFiles('package-lock.json', 'resources/manifest.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-downloads-

      - name: Sync package version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare-release.outputs.version }}"
          echo "Syncing npm/package.json version to ${VERSION}"
          npm version "${VERSION}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build Linux assets
        if: startsWith(matrix.target.id, 'linux-')
        run: node scripts/ci-build.js --platform linux --target "${{ matrix.target.builder_target }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAGICODE_EMBEDDED_DOTNET_PLATFORM: linux-x64

      - name: Build macOS assets
        if: startsWith(matrix.target.id, 'macos-')
        run: node scripts/ci-build.js --platform mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAGICODE_MAC_BUILD_ARCHS: ${{ matrix.target.mac_arch }}

      - name: Summarize Linux artifacts
        if: startsWith(matrix.target.id, 'linux-') && success()
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifact_files=(pkg/${{ matrix.target.artifact_glob }})
          artifact_count=${#artifact_files[@]}
          report_path="pkg/ci-build-report-linux-${{ matrix.target.report_suffix }}.json"

          {
            echo '## Linux packaging artifacts'
            echo
            echo '- Package target: ${{ matrix.target.builder_target }}'
            echo '- Artifact pattern: pkg/${{ matrix.target.artifact_glob }}'
            echo "- Matched artifacts: ${artifact_count}"
            echo "- CI build report: \\`${report_path}\\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$artifact_count" -eq 0 ]; then
            echo '::error::Linux target artifact was not produced in pkg/.'
            exit 1
          fi

          if [ ! -f "$report_path" ]; then
            echo "::error::Linux CI build report is missing: $report_path"
            exit 1
          fi

      - name: Validate macOS artifacts
        if: startsWith(matrix.target.id, 'macos-')
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmg_files=(pkg/*.dmg)
          zip_files=(pkg/*.zip)

          {
            echo '## macOS packaging artifacts'
            echo
            echo "- Target architecture: ${{ matrix.target.mac_arch }}"
            echo "- DMG artifacts: ${#dmg_files[@]}"
            echo "- ZIP artifacts: ${#zip_files[@]}"
            echo '- CI build report: `pkg/ci-build-report-mac.json`'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${#dmg_files[@]}" -eq 0 ] || [ "${#zip_files[@]}" -eq 0 ]; then
            echo '::error::macOS DMG/ZIP artifacts were not both produced in pkg/.'
            exit 1
          fi

      - name: Upload Linux release bundle
        if: startsWith(matrix.target.id, 'linux-')
        uses: actions/upload-artifact@v4
        with:
          name: dev-release-${{ matrix.target.id }}
          path: |
            pkg/${{ matrix.target.artifact_glob }}
            pkg/ci-build-report-linux-${{ matrix.target.report_suffix }}.json
          retention-days: 14
          if-no-files-found: error

      - name: Upload macOS release bundle
        if: startsWith(matrix.target.id, 'macos-')
        uses: actions/upload-artifact@v4
        with:
          name: dev-release-${{ matrix.target.id }}
          path: |
            pkg/*.dmg
            pkg/*.zip
            pkg/ci-build-report-mac.json
          retention-days: 14
          if-no-files-found: error

  publish-platform-assets:
    name: Publish ${{ matrix.target.name }} Dev Assets
    needs:
      - prepare-release
      - build-platform-assets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: linux-appimage
            name: Linux AppImage
            artifact_path: release-assets/linux-appimage
            upload_glob: '**/*.AppImage'
          - id: linux-tar-gz
            name: Linux tar.gz
            artifact_path: release-assets/linux-tar-gz
            upload_glob: '**/*.tar.gz'
          - id: linux-zip
            name: Linux ZIP
            artifact_path: release-assets/linux-zip
            upload_glob: '**/*.zip'
          - id: macos-x64
            name: macOS (x64)
          - id: macos-arm64
            name: macOS (arm64)

    steps:
      - name: Download Linux release bundle
        if: startsWith(matrix.target.id, 'linux-')
        uses: actions/download-artifact@v4
        with:
          name: dev-release-${{ matrix.target.id }}
          path: ${{ matrix.target.artifact_path }}

      - name: Download macOS release bundle
        if: startsWith(matrix.target.id, 'macos-')
        uses: actions/download-artifact@v4
        with:
          name: dev-release-${{ matrix.target.id }}
          path: release-assets/${{ matrix.target.id }}

      - name: Upload Linux assets to prerelease
        if: startsWith(matrix.target.id, 'linux-')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          name: ${{ needs.prepare-release.outputs.release_name }}
          draft: 'false'
          prerelease: 'true'
          overwrite_files: 'true'
          files: |
            ${{ matrix.target.artifact_path }}/${{ matrix.target.upload_glob }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS assets to prerelease
        if: startsWith(matrix.target.id, 'macos-')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          name: ${{ needs.prepare-release.outputs.release_name }}
          draft: 'false'
          prerelease: 'true'
          overwrite_files: 'true'
          files: |
            release-assets/${{ matrix.target.id }}/**/*.dmg
            release-assets/${{ matrix.target.id }}/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-summary:
    name: Publish Dev Summary
    needs:
      - prepare-release
      - build-windows
      - publish-windows
      - build-platform-assets
      - publish-platform-assets
    if: always()
    runs-on: ubuntu-latest
    outputs:
      release_status: ${{ steps.status.outputs.overall }}
      channel: ${{ steps.status.outputs.channel }}

    steps:
      - name: Determine workflow status
        id: status
        shell: bash
        run: |
          set -euo pipefail
          windows_build_status="${{ needs.build-windows.result }}"
          windows_publish_status="${{ needs.publish-windows.result }}"
          platform_build_status="${{ needs.build-platform-assets.result }}"
          platform_publish_status="${{ needs.publish-platform-assets.result }}"

          echo "Windows build: ${windows_build_status}"
          echo "Windows publish: ${windows_publish_status}"
          echo "Matrix build: ${platform_build_status}"
          echo "Matrix publish: ${platform_publish_status}"

          if [ "$windows_build_status" != 'success' ] || [ "$windows_publish_status" != 'success' ] || \
             [ "$platform_build_status" != 'success' ] || [ "$platform_publish_status" != 'success' ]; then
            echo 'overall=failed' >> "$GITHUB_OUTPUT"
          else
            echo 'overall=success' >> "$GITHUB_OUTPUT"
          fi

          echo 'channel=dev' >> "$GITHUB_OUTPUT"

      - name: Publish workflow summary
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.status.outputs.overall }}" = 'success' ]; then
            azure_sync_eligible=true
          else
            azure_sync_eligible=false
          fi

          {
            echo '## Publish dev orchestration summary'
            echo
            echo '- Version: ${{ needs.prepare-release.outputs.version }}'
            echo '- Release tag: ${{ needs.prepare-release.outputs.release_tag }}'
            echo '- Windows build status: ${{ needs.build-windows.result }}'
            echo '- Windows publish status: ${{ needs.publish-windows.result }}'
            echo '- Non-Windows matrix build status: ${{ needs.build-platform-assets.result }}'
            echo '- Non-Windows matrix publish status: ${{ needs.publish-platform-assets.result }}'
            echo '- Overall status: ${{ steps.status.outputs.overall }}'
            echo "- Azure sync eligible: ${azure_sync_eligible}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow on platform failure
        if: steps.status.outputs.overall != 'success'
        shell: bash
        run: |
          echo '::error::One or more publish dev build or upload jobs failed. Azure sync is blocked.'
          exit 1

  sync-azure-upload:
    name: Upload Dev Release Shards to Azure Storage
    needs:
      - prepare-release
      - build-summary
    if: ${{ always() && needs.build-summary.outputs.release_status == 'success' }}
    uses: ./.github/workflows/sync-azure-storage.yml
    with:
      release_tag: ${{ needs.prepare-release.outputs.release_tag }}
      release_version: v${{ needs.prepare-release.outputs.version }}
      release_channel: ${{ needs.prepare-release.outputs.channel }}
    secrets: inherit

  sync-azure-finalize:
    name: Finalize Dev Azure Storage Sync
    needs: sync-azure-upload
    if: ${{ always() && needs.sync-azure-upload.result == 'success' }}
    uses: ./.github/workflows/finalize-azure-storage.yml
    secrets: inherit
