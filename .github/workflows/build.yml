      - name: Code signing failure notification
        if: failure() && steps.signing_policy.outputs.required == 'true'
        uses: HagiCode-org/haginotifier@v1.0.0
        with:
          message: |
            **代码签名失败**

            平台: Windows
            版本: ${{ github.ref_name }}
            提交: `${{ github.sha }}`

            请检查签名配置和证书状态。
            可能的原因：
            - GitHub OIDC 到 Azure 的联邦身份或角色配置不完整
            - Artifact Signing 端点、签名账户或证书配置文件配置错误
            - 产物签名成功但验签失败

