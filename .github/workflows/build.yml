name: Build Hagicode Desktop

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel (stable, beta, dev)'
        required: false
        type: choice
        options:
          - stable
          - beta
          - dev
      sign_windows_release:
        description: 'Sign Windows release artifacts in this manual run'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  HAGISCRIPT_VERSION: 'latest'
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

jobs:
  prepare-release:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      channel: ${{ steps.meta.outputs.channel }}
      channel_source: ${{ steps.meta.outputs.channel_source }}
      version_source: ${{ steps.meta.outputs.version_source }}
      is_tag_release: ${{ steps.meta.outputs.is_tag_release }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve main branch version with Release Drafter
        id: draft
        if: github.ref == 'refs/heads/main'
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          MANUAL_CHANNEL: ${{ github.event.inputs.channel || '' }}
          DRAFT_VERSION: ${{ steps.draft.outputs.resolved_version || '' }}
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"
          draft_version="${DRAFT_VERSION}"
          version="${package_version}"
          release_tag=''
          release_name="Build ${package_version}"
          version_source="package-json:${package_version}"
          is_tag_release='false'

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            release_tag="${GITHUB_REF_NAME}"
            release_name="Release ${release_tag}"
            version_source="tag:${GITHUB_REF_NAME}"
            is_tag_release='true'
          elif [[ "${GITHUB_REF}" == 'refs/heads/main' ]]; then
            if [[ -z "${draft_version}" ]]; then
              echo '::error::Release Drafter did not return resolved_version for the main branch build.'
              exit 1
            fi
            version="${draft_version}"
            release_name="Main Build ${version}"
            version_source="release-drafter:${version}"
          fi

          if [[ -n "${MANUAL_CHANNEL}" ]]; then
            channel="${MANUAL_CHANNEL}"
            channel_source='manual-input'
          elif [[ "${is_tag_release}" == 'true' ]]; then
            if [[ "${version}" =~ -(beta|rc) ]]; then
              channel='beta'
            elif [[ "${version}" =~ -(alpha|dev) ]]; then
              channel='dev'
            else
              channel='stable'
            fi
            channel_source="tag:${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_REF}" == 'refs/heads/main' ]]; then
            channel='beta'
            channel_source='branch:main'
          else
            channel='dev'
            channel_source="ref:${GITHUB_REF}"
          fi

          {
            echo "version=${version}"
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
            echo "channel=${channel}"
            echo "channel_source=${channel_source}"
            echo "version_source=${version_source}"
            echo "is_tag_release=${is_tag_release}"
          } >> "$GITHUB_OUTPUT"

      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo '## Release metadata prepared'
            echo
            echo '- Version: ${{ steps.meta.outputs.version }}'
            echo '- Release tag: ${{ steps.meta.outputs.release_tag || '(none)' }}'
            echo '- Release channel: ${{ steps.meta.outputs.channel }}'
            echo '- Channel source: ${{ steps.meta.outputs.channel_source }}'
            echo '- Version source: ${{ steps.meta.outputs.version_source }}'
            echo '- Tag release: ${{ steps.meta.outputs.is_tag_release }}'
            echo '- Ref: ${{ github.ref }}'
            echo '- Commit: ${{ github.sha }}'
          } >> "$GITHUB_STEP_SUMMARY"

  build-windows:
    name: Build Windows (${{ matrix.target.name }})
    runs-on: windows-2022
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: portable
            name: Portable
            builder_target: portable
            report_suffix: portable
            requires_zip: true
          - id: nsis
            name: NSIS
            builder_target: nsis
            report_suffix: nsis
            requires_zip: false
          - id: appx
            name: AppX
            builder_target: appx
            report_suffix: appx
            requires_zip: false
    permissions:
      contents: write
      id-token: write
    env:
      RELEASE_CHANNEL: ${{ needs.prepare-release.outputs.channel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine Windows signing policy
        id: signing_policy
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            required=true
            reason="tag release"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.sign_windows_release }}" == "true" ]]; then
            required=true
            reason="manual workflow_dispatch override"
          else
            required=false
            reason="non-release build"
          fi

          echo "required=${required}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"
          echo "Windows signing required: ${required} (${reason})"

      - name: Validate Artifact Signing configuration
        if: success() && steps.signing_policy.outputs.required == 'true'
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CODESIGN_ENDPOINT: ${{ secrets.AZURE_CODESIGN_ENDPOINT }}
          AZURE_CODESIGN_ACCOUNT_NAME: ${{ secrets.AZURE_CODESIGN_ACCOUNT_NAME }}
          AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME }}
        run: |
          missing=()

          for key in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_CODESIGN_ENDPOINT AZURE_CODESIGN_ACCOUNT_NAME AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME; do
            if [ -z "${!key}" ]; then
              missing+=("${key}")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            printf '::error::Missing Artifact Signing configuration: %s\n' "$(IFS=', '; echo "${missing[*]}")"
            {
              echo '## Windows code signing configuration error'
              echo
              echo 'The release build requires Artifact Signing, but the following values are missing:'
              echo
              for key in "${missing[@]}"; do
                echo "- ${key}"
              done
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install global hagiscript
        shell: bash
        run: |
          npm install --global "@hagicode/hagiscript@${HAGISCRIPT_VERSION}"
          prefix="$(npm config get prefix)"
          echo "$prefix" >> "$GITHUB_PATH"
          if [ -d "$prefix/bin" ]; then
            echo "$prefix/bin" >> "$GITHUB_PATH"
          fi
          hash -r
          hagiscript --version

      - name: Cache build downloads
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
            build/embedded-runtime/downloads
            build/embedded-node-runtime/downloads
            .generated/code-server-runtime/downloads
            .generated/omniroute-runtime/downloads
          key: ${{ runner.os }}-build-downloads-${{ hashFiles('package-lock.json', 'resources/manifest.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-downloads-

      - name: Sync package version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare-release.outputs.version }}"
          echo "Syncing npm/package.json version to ${VERSION}"
          npm version "${VERSION}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build Windows ${{ matrix.target.name }} package
        shell: bash
        run: node scripts/ci-build.js --platform win --target "${{ matrix.target.builder_target }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAGICODE_EMBEDDED_DOTNET_PLATFORM: win-x64

      - name: Collect Windows ${{ matrix.target.name }} artifacts
        id: windows_artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pkgDir = Join-Path $env:GITHUB_WORKSPACE 'pkg'
          if (-not (Test-Path $pkgDir)) {
            throw "pkg directory not found: $pkgDir"
          }

          $allFiles = Get-ChildItem -Path $pkgDir -File
          $nsis = @($allFiles | Where-Object { $_.Extension -ieq '.exe' -and $_.Name -like '*Setup*' } | Sort-Object FullName -Unique)
          $portable = @($allFiles | Where-Object { $_.Extension -ieq '.exe' -and $_.Name -notlike '*Setup*' } | Sort-Object FullName -Unique)
          $appx = @($allFiles | Where-Object { $_.Extension -ieq '.appx' } | Sort-Object FullName -Unique)
          $selectedFiles = switch ('${{ matrix.target.id }}') {
            'portable' { $portable }
            'nsis' { $nsis }
            'appx' { $appx }
            default { @() }
          }
          $unpackedRoots = @(Get-ChildItem -Path $pkgDir -Directory | Where-Object { $_.Name -eq 'win-unpacked' } | Sort-Object FullName -Unique)
          $catalogPath = Join-Path $pkgDir 'windows-signable-artifacts.txt'
          $buildReport = Join-Path $pkgDir 'ci-build-report-win-${{ matrix.target.report_suffix }}.json'

          if ($selectedFiles.Count -eq 0) {
            throw "No Windows ${{ matrix.target.name }} artifacts were found in pkg/."
          }

          if ('${{ matrix.target.id }}' -eq 'portable' -and $unpackedRoots.Count -eq 0) {
            throw 'No win-unpacked directory was found in pkg/ for ZIP assembly.'
          }

          if (-not (Test-Path $buildReport)) {
            throw "CI build report was not found: $buildReport"
          }

          $catalogEntries = @()
          foreach ($file in $selectedFiles) {
            $catalogEntries += [System.IO.Path]::GetRelativePath($pkgDir, $file.FullName).Replace([System.IO.Path]::DirectorySeparatorChar, '/')
          }
          $catalogEntries = @($catalogEntries | Sort-Object -Unique)
          $catalogEntries | Set-Content -Path $catalogPath

          $zipPayloadRoot = Join-Path $pkgDir 'windows-zip-payload'
          $zipBaseName = [System.IO.Path]::GetFileNameWithoutExtension($selectedFiles[0].Name)

          function Write-MultilineOutput([string]$Name, [object[]]$Files) {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "$Name<<EOF"
            foreach ($file in $Files) {
              Add-Content -Path $env:GITHUB_OUTPUT -Value $file.FullName
            }
            Add-Content -Path $env:GITHUB_OUTPUT -Value 'EOF'
          }

          Write-MultilineOutput 'package_files' $selectedFiles
          Write-MultilineOutput 'unpacked_roots' $unpackedRoots
          Add-Content -Path $env:GITHUB_OUTPUT -Value "catalog_path=$catalogPath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_payload_root=$zipPayloadRoot"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_base_name=$zipBaseName"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "package_count=$($selectedFiles.Count)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "unpacked_count=$($unpackedRoots.Count)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "report_path=$buildReport"

      - name: Prepare Windows unpacked ZIP payload workspace
        if: success() && matrix.target.requires_zip
        id: windows_zip_payload
        shell: pwsh
        env:
          WINDOWS_UNPACKED_ROOTS: ${{ steps.windows_artifacts.outputs.unpacked_roots }}
          WINDOWS_SIGNABLE_FILES: ${{ steps.windows_artifacts.outputs.package_files }}
          WINDOWS_ZIP_BASE_NAME: ${{ steps.windows_artifacts.outputs.zip_base_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $zipPayloadRoot = '${{ steps.windows_artifacts.outputs.zip_payload_root }}'
          $catalogPath = '${{ steps.windows_artifacts.outputs.catalog_path }}'
          $pkgDir = Split-Path -Path $catalogPath -Parent

          if (Test-Path $zipPayloadRoot) {
            Remove-Item -Path $zipPayloadRoot -Recurse -Force
          }
          New-Item -Path $zipPayloadRoot -ItemType Directory -Force | Out-Null

          $unpackedRoots = @()
          $env:WINDOWS_UNPACKED_ROOTS -split "`r?`n" | ForEach-Object {
            $trimmed = $_.Trim()
            if ($trimmed) {
              $unpackedRoots += $trimmed
            }
          }

          if ($unpackedRoots.Count -eq 0) {
            throw 'No unpacked Windows roots were passed to ZIP payload staging.'
          }

          $payloadDirName = "{0}-unpacked" -f $env:WINDOWS_ZIP_BASE_NAME
          $payloadDir = Join-Path $zipPayloadRoot $payloadDirName
          New-Item -Path $payloadDir -ItemType Directory -Force | Out-Null

          foreach ($unpackedRootPath in $unpackedRoots) {
            $unpackedRoot = Get-Item -LiteralPath $unpackedRootPath
            Get-ChildItem -LiteralPath $unpackedRoot.FullName -Force | ForEach-Object {
              $targetPath = Join-Path $payloadDir $_.Name
              if ($_.PSIsContainer) {
                Copy-Item -LiteralPath $_.FullName -Destination $targetPath -Recurse -Force
              } else {
                Copy-Item -LiteralPath $_.FullName -Destination $targetPath -Force
              }
            }
          }

          $zipPayloadFiles = @(Get-ChildItem -LiteralPath $payloadDir -Recurse -File | Sort-Object FullName)
          if ($zipPayloadFiles.Count -eq 0) {
            throw 'Windows ZIP payload staging did not produce any files.'
          }

          $signableFiles = @()
          $env:WINDOWS_SIGNABLE_FILES -split "`r?`n" | ForEach-Object {
            $trimmed = $_.Trim()
            if ($trimmed) {
              $signableFiles += $trimmed
            }
          }

          $zipPayloadRootExecutables = @(
            $zipPayloadFiles | Where-Object {
              $_.Extension -ieq '.exe' -and
              $_.DirectoryName -eq $payloadDir
            } | Sort-Object FullName -Unique
          )

          if ($zipPayloadRootExecutables.Count -ne 1) {
            $detectedExecutables = if ($zipPayloadRootExecutables.Count -gt 0) {
              ($zipPayloadRootExecutables | ForEach-Object { $_.FullName }) -join [Environment]::NewLine
            } else {
              '(none)'
            }
            throw "Expected exactly one root desktop executable in ZIP payload staging, found $($zipPayloadRootExecutables.Count):`n$detectedExecutables"
          }

          $catalogEntries = @()
          foreach ($filePath in @($signableFiles + ($zipPayloadRootExecutables | ForEach-Object { $_.FullName }))) {
            $resolvedPath = Resolve-Path -LiteralPath $filePath | Select-Object -ExpandProperty Path
            $catalogEntries += [System.IO.Path]::GetRelativePath($pkgDir, $resolvedPath).Replace([System.IO.Path]::DirectorySeparatorChar, '/')
          }
          $catalogEntries = @($catalogEntries | Sort-Object -Unique)
          $catalogEntries | Set-Content -Path $catalogPath

          Add-Content -Path $env:GITHUB_OUTPUT -Value "payload_dir=$payloadDir"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "payload_dir_name=$payloadDirName"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_payload_count=$($zipPayloadFiles.Count)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_payload_signable_count=$($zipPayloadRootExecutables.Count)"

      - name: Azure login for Artifact Signing
        if: success() && steps.signing_policy.outputs.required == 'true' && matrix.target.id != 'appx'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows ${{ matrix.target.name }} root EXE artifacts with Artifact Signing
        if: success() && steps.signing_policy.outputs.required == 'true' && matrix.target.id != 'appx'
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ secrets.AZURE_CODESIGN_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_CODESIGN_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}/pkg
          files-folder-filter: '*.exe'
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Hagicode Desktop
          description-url: https://github.com/HagiCode-org/desktop
          timeout: 600

      - name: Sign unpacked Windows root EXE with Artifact Signing
        if: success() && matrix.target.requires_zip && steps.signing_policy.outputs.required == 'true'
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ secrets.AZURE_CODESIGN_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_CODESIGN_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ steps.windows_zip_payload.outputs.payload_dir }}
          files-folder-filter: '*.exe'
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Hagicode Desktop
          description-url: https://github.com/HagiCode-org/desktop
          timeout: 600

      - name: Verify Windows signatures
        if: success() && steps.signing_policy.outputs.required == 'true' && matrix.target.id != 'appx'
        shell: bash
        env:
          VERIFY_STRICT: 'true'
        run: |
          node scripts/verify-signature.js --catalog "${{ steps.windows_artifacts.outputs.catalog_path }}"

      - name: Create Windows ZIP artifact
        if: success() && matrix.target.requires_zip
        id: windows_zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pkgDir = Join-Path $env:GITHUB_WORKSPACE 'pkg'
          $payloadDir = '${{ steps.windows_zip_payload.outputs.payload_dir }}'
          $payloadDirName = '${{ steps.windows_zip_payload.outputs.payload_dir_name }}'
          if (-not (Test-Path $payloadDir)) {
            throw "Windows ZIP payload directory not found: $payloadDir"
          }

          $zipPath = Join-Path $pkgDir ("{0}.zip" -f $payloadDirName)
          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $payloadDir '*') -DestinationPath $zipPath -CompressionLevel Optimal
          $zipFile = Get-Item -LiteralPath $zipPath

          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_files<<EOF"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $zipFile.FullName
          Add-Content -Path $env:GITHUB_OUTPUT -Value 'EOF'
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_path=$($zipFile.FullName)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value 'zip_count=1'

      - name: Verify Windows ZIP toolchain payload
        if: success() && matrix.target.requires_zip && steps.windows_zip.outputs.zip_path != ''
        shell: bash
        run: |
          node scripts/verify-release-archives.js --archive "${{ steps.windows_zip.outputs.zip_path }}"

      - name: Summarize Windows package build
        if: success()
        shell: bash
        run: |
          {
            echo '## Windows package build'
            echo
            echo '- Package target: ${{ matrix.target.name }}'
            echo '- Version: ${{ needs.prepare-release.outputs.version }}'
            echo '- Release channel: ${{ needs.prepare-release.outputs.channel }}'
            echo "- Signing policy: ${{ steps.signing_policy.outputs.reason }}"
            echo '- Package artifacts discovered: ${{ steps.windows_artifacts.outputs.package_count }}'
            echo '- Unpacked roots discovered: ${{ steps.windows_artifacts.outputs.unpacked_count }}'
            echo '- ZIP payload files staged: ${{ steps.windows_zip_payload.outputs.zip_payload_count }}'
            echo '- ZIP artifacts created: ${{ steps.windows_zip.outputs.zip_count }}'
            echo '- CI build report: `${{ steps.windows_artifacts.outputs.report_path }}`'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Windows release bundle
        uses: actions/upload-artifact@v4
        if: success() && startsWith(github.ref, 'refs/tags/v')
        with:
          name: release-windows-${{ matrix.target.id }}-assets
          path: |
            ${{ steps.windows_artifacts.outputs.package_files }}
            ${{ steps.windows_zip.outputs.zip_files }}
            ${{ steps.windows_artifacts.outputs.report_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload Windows build bundle
        uses: actions/upload-artifact@v4
        if: success() && !startsWith(github.ref, 'refs/tags/v')
        with:
          name: hagicode-windows-${{ matrix.target.id }}-${{ github.sha }}
          path: |
            ${{ steps.windows_artifacts.outputs.package_files }}
            ${{ steps.windows_zip.outputs.zip_files }}
            ${{ steps.windows_artifacts.outputs.report_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Code signing failure notification
        if: failure()
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:FEISHU_WEBHOOK_URL)) {
            Write-Host 'FEISHU_WEBHOOK_URL is empty, skipping Windows code signing failure notification.'
            exit 0
          }

          $message = @(
            '代码签名失败 (Windows) ❌',
            '',
            '平台: Windows / ${{ matrix.target.name }}',
            '版本: ${{ needs.prepare-release.outputs.release_tag || needs.prepare-release.outputs.version }}',
            '提交: ${{ github.sha }}',
            '',
            '请检查签名配置和证书状态。',
            '可能的原因：',
            '- GitHub OIDC 到 Azure 的联邦身份或角色配置不完整',
            '- Artifact Signing 端点、签名账户或证书配置文件配置错误',
            '- 产物签名成功但验签失败',
            '',
            '查看详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          ) -join "`n"

          $payload = @{
            msg_type = 'text'
            content = @{
              text = $message
            }
          } | ConvertTo-Json -Depth 4

          Invoke-RestMethod -Method Post -Uri $env:FEISHU_WEBHOOK_URL -ContentType 'application/json' -Body $payload | Out-Null
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

  build-platform-artifacts:
    name: Build ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runs_on }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: linux-appimage
            name: Linux AppImage
            runs_on: ubuntu-latest
            builder_target: AppImage
            report_suffix: appimage
            artifact_glob: '*.AppImage'
          - id: linux-tar-gz
            name: Linux tar.gz
            runs_on: ubuntu-latest
            builder_target: tar.gz
            report_suffix: tar-gz
            artifact_glob: '*.tar.gz'
          - id: linux-zip
            name: Linux ZIP
            runs_on: ubuntu-latest
            builder_target: zip
            report_suffix: zip
            artifact_glob: '*.zip'
          - id: macos-x64-dmg
            name: macOS x64 DMG
            runs_on: macos-latest
            mac_arch: x64
            mac_runtime_platform: osx-x64
            builder_target: dmg
            report_suffix: dmg
            artifact_glob: '*.dmg'
            upload_glob: '**/*.dmg'
          - id: macos-x64-zip
            name: macOS x64 ZIP
            runs_on: macos-latest
            mac_arch: x64
            mac_runtime_platform: osx-x64
            builder_target: zip
            report_suffix: zip
            artifact_glob: '*.zip'
            upload_glob: '**/*.zip'
          - id: macos-arm64-dmg
            name: macOS arm64 DMG
            runs_on: macos-latest
            mac_arch: arm64
            mac_runtime_platform: osx-arm64
            builder_target: dmg
            report_suffix: dmg
            artifact_glob: '*.dmg'
            upload_glob: '**/*.dmg'
          - id: macos-arm64-zip
            name: macOS arm64 ZIP
            runs_on: macos-latest
            mac_arch: arm64
            mac_runtime_platform: osx-arm64
            builder_target: zip
            report_suffix: zip
            artifact_glob: '*.zip'
            upload_glob: '**/*.zip'
    env:
      RELEASE_CHANNEL: ${{ needs.prepare-release.outputs.channel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install global hagiscript
        shell: bash
        run: |
          npm install --global "@hagicode/hagiscript@${HAGISCRIPT_VERSION}"
          prefix="$(npm config get prefix)"
          echo "$prefix" >> "$GITHUB_PATH"
          if [ -d "$prefix/bin" ]; then
            echo "$prefix/bin" >> "$GITHUB_PATH"
          fi
          hash -r
          hagiscript --version

      - name: Cache build downloads
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
            build/embedded-runtime/downloads
            build/embedded-node-runtime/downloads
            .generated/code-server-runtime/downloads
            .generated/omniroute-runtime/downloads
          key: ${{ runner.os }}-build-downloads-${{ hashFiles('package-lock.json', 'resources/manifest.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-downloads-

      - name: Sync package version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare-release.outputs.version }}"
          echo "Syncing npm/package.json version to ${VERSION}"
          npm version "${VERSION}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build Linux artifacts
        if: startsWith(matrix.target.id, 'linux-')
        run: node scripts/ci-build.js --platform linux --target "${{ matrix.target.builder_target }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAGICODE_EMBEDDED_DOTNET_PLATFORM: linux-x64

      - name: Build macOS artifacts
        if: startsWith(matrix.target.id, 'macos-')
        run: node scripts/ci-build.js --platform mac --target "${{ matrix.target.builder_target }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAGICODE_MAC_BUILD_ARCHS: ${{ matrix.target.mac_arch }}
          HAGICODE_EMBEDDED_DOTNET_PLATFORM: ${{ matrix.target.mac_runtime_platform }}
          HAGICODE_EMBEDDED_NODE_PLATFORM: ${{ matrix.target.mac_runtime_platform }}
          HAGICODE_CODE_SERVER_PLATFORM: ${{ matrix.target.mac_runtime_platform }}
          HAGICODE_OMNIROUTE_PLATFORM: ${{ matrix.target.mac_runtime_platform }}

      - name: Summarize Linux artifacts
        if: startsWith(matrix.target.id, 'linux-') && success()
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifact_files=(pkg/${{ matrix.target.artifact_glob }})
          artifact_count=${#artifact_files[@]}
          report_path="pkg/ci-build-report-linux-${{ matrix.target.report_suffix }}.json"

          {
            echo '## Linux packaging artifacts'
            echo
            echo '- Version: ${{ needs.prepare-release.outputs.version }}'
            echo '- Release channel: ${{ needs.prepare-release.outputs.channel }}'
            echo '- Package target: ${{ matrix.target.builder_target }}'
            echo '- Artifact pattern: pkg/${{ matrix.target.artifact_glob }}'
            echo "- Matched artifacts: ${artifact_count}"
            echo "- CI build report: \\`${report_path}\\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$artifact_count" -eq 0 ]; then
            echo '::error::Linux target artifact was not produced in pkg/.'
            exit 1
          fi

          if [ ! -f "$report_path" ]; then
            echo "::error::Linux CI build report is missing: $report_path"
            exit 1
          fi

      - name: Validate macOS artifacts
        if: startsWith(matrix.target.id, 'macos-')
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifact_files=(pkg/${{ matrix.target.artifact_glob }})
          artifact_count=${#artifact_files[@]}
          report_path="pkg/ci-build-report-mac-${{ matrix.target.report_suffix }}.json"

          {
            echo '## macOS packaging artifacts'
            echo
            echo '- Version: ${{ needs.prepare-release.outputs.version }}'
            echo '- Release channel: ${{ needs.prepare-release.outputs.channel }}'
            echo "- Target architecture: ${{ matrix.target.mac_arch }}"
            echo "- Package target: ${{ matrix.target.builder_target }}"
            echo '- Artifact pattern: pkg/${{ matrix.target.artifact_glob }}'
            echo "- Matched artifacts: ${artifact_count}"
            echo "- CI build report: \`${report_path}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$artifact_count" -eq 0 ]; then
            echo '::error::macOS target artifact was not produced in pkg/.'
            exit 1
          fi

          if [ ! -f "$report_path" ]; then
            echo "::error::macOS CI build report is missing: $report_path"
            exit 1
          fi

      - name: Upload Linux release bundle
        if: startsWith(matrix.target.id, 'linux-') && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target.id }}-assets
          path: |
            pkg/${{ matrix.target.artifact_glob }}
            pkg/ci-build-report-linux-${{ matrix.target.report_suffix }}.json
          retention-days: 30
          if-no-files-found: error

      - name: Upload Linux build bundle
        if: startsWith(matrix.target.id, 'linux-') && success() && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: hagicode-${{ matrix.target.id }}-${{ github.sha }}
          path: |
            pkg/${{ matrix.target.artifact_glob }}
            pkg/ci-build-report-linux-${{ matrix.target.report_suffix }}.json
          retention-days: 30
          if-no-files-found: error

      - name: Upload macOS release bundle
        if: startsWith(matrix.target.id, 'macos-') && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target.id }}-assets
          path: |
            pkg/${{ matrix.target.artifact_glob }}
            pkg/ci-build-report-mac-${{ matrix.target.report_suffix }}.json
          retention-days: 30
          if-no-files-found: error

      - name: Upload macOS build bundle
        if: startsWith(matrix.target.id, 'macos-') && success() && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: hagicode-${{ matrix.target.id }}-${{ github.sha }}
          path: |
            pkg/${{ matrix.target.artifact_glob }}
            pkg/ci-build-report-mac-${{ matrix.target.report_suffix }}.json
          retention-days: 30
          if-no-files-found: error

  publish-windows-release:
    name: Publish Windows Release Assets
    needs:
      - prepare-release
      - build-windows
    if: ${{ needs.prepare-release.outputs.is_tag_release == 'true' && needs.build-windows.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows release bundle
        uses: actions/download-artifact@v4
        with:
          pattern: release-windows-*-assets
          merge-multiple: true
          path: release-assets/windows

      - name: Upload Windows assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          overwrite_files: 'true'
          files: |
            release-assets/windows/**/*.exe
            release-assets/windows/**/*.zip
            release-assets/windows/**/*.appx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-platform-release:
    name: Publish ${{ matrix.target.name }} Release Assets
    needs:
      - prepare-release
      - build-platform-artifacts
    if: ${{ needs.prepare-release.outputs.is_tag_release == 'true' && needs.build-platform-artifacts.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: linux-appimage
            name: Linux AppImage
            artifact_path: release-assets/linux-appimage
            upload_glob: '**/*.AppImage'
          - id: linux-tar-gz
            name: Linux tar.gz
            artifact_path: release-assets/linux-tar-gz
            upload_glob: '**/*.tar.gz'
          - id: linux-zip
            name: Linux ZIP
            artifact_path: release-assets/linux-zip
            upload_glob: '**/*.zip'
          - id: macos-x64-dmg
            name: macOS x64 DMG
            artifact_path: release-assets/macos-x64-dmg
            upload_glob: '**/*.dmg'
          - id: macos-x64-zip
            name: macOS x64 ZIP
            artifact_path: release-assets/macos-x64-zip
            upload_glob: '**/*.zip'
          - id: macos-arm64-dmg
            name: macOS arm64 DMG
            artifact_path: release-assets/macos-arm64-dmg
            upload_glob: '**/*.dmg'
          - id: macos-arm64-zip
            name: macOS arm64 ZIP
            artifact_path: release-assets/macos-arm64-zip
            upload_glob: '**/*.zip'

    steps:
      - name: Download Linux release bundle
        if: startsWith(matrix.target.id, 'linux-')
        uses: actions/download-artifact@v4
        with:
          name: release-${{ matrix.target.id }}-assets
          path: ${{ matrix.target.artifact_path }}

      - name: Download macOS release bundle
        if: startsWith(matrix.target.id, 'macos-')
        uses: actions/download-artifact@v4
        with:
          name: release-${{ matrix.target.id }}-assets
          path: ${{ matrix.target.artifact_path }}

      - name: Upload Linux assets to GitHub Release
        if: startsWith(matrix.target.id, 'linux-')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          overwrite_files: 'true'
          files: |
            ${{ matrix.target.artifact_path }}/${{ matrix.target.upload_glob }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS assets to GitHub Release
        if: startsWith(matrix.target.id, 'macos-')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          overwrite_files: 'true'
          files: |
            ${{ matrix.target.artifact_path }}/${{ matrix.target.upload_glob }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-summary:
    name: Build Summary
    outputs:
      channel: ${{ needs.prepare-release.outputs.channel }}
      release_status: ${{ steps.status.outputs.overall }}
      sync_eligible: ${{ steps.status.outputs.sync_eligible }}
    needs:
      - prepare-release
      - build-windows
      - build-platform-artifacts
      - publish-windows-release
      - publish-platform-release
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Determine workflow status
        id: status
        if: always()
        shell: bash
        env:
          IS_TAG_RELEASE: ${{ needs.prepare-release.outputs.is_tag_release }}
          BUILD_WINDOWS_STATUS: ${{ needs.build-windows.result }}
          BUILD_PLATFORMS_STATUS: ${{ needs.build-platform-artifacts.result }}
          PUBLISH_WINDOWS_STATUS: ${{ needs.publish-windows-release.result }}
          PUBLISH_PLATFORMS_STATUS: ${{ needs.publish-platform-release.result }}
        run: |
          set -euo pipefail

          windows_build_status="${BUILD_WINDOWS_STATUS}"
          platform_build_status="${BUILD_PLATFORMS_STATUS}"
          windows_publish_status="${PUBLISH_WINDOWS_STATUS}"
          platform_publish_status="${PUBLISH_PLATFORMS_STATUS}"

          echo "Windows build: ${windows_build_status}"
          echo "Matrix build: ${platform_build_status}"
          if [ "${IS_TAG_RELEASE}" = 'true' ]; then
            echo "Windows publish: ${windows_publish_status}"
            echo "Matrix publish: ${platform_publish_status}"
          fi

          echo "windows_build_status=${windows_build_status}" >> "$GITHUB_OUTPUT"
          echo "platform_build_status=${platform_build_status}" >> "$GITHUB_OUTPUT"
          echo "windows_publish_status=${windows_publish_status}" >> "$GITHUB_OUTPUT"
          echo "platform_publish_status=${platform_publish_status}" >> "$GITHUB_OUTPUT"

          if [ "${windows_build_status}" != 'success' ] || [ "${platform_build_status}" != 'success' ]; then
            echo 'overall=failed' >> "$GITHUB_OUTPUT"
            echo 'status_icon=❌' >> "$GITHUB_OUTPUT"
            echo 'status_text=失败' >> "$GITHUB_OUTPUT"
            echo 'sync_eligible=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${IS_TAG_RELEASE}" = 'true' ] && { [ "${windows_publish_status}" != 'success' ] || [ "${platform_publish_status}" != 'success' ]; }; then
            echo 'overall=failed' >> "$GITHUB_OUTPUT"
            echo 'status_icon=❌' >> "$GITHUB_OUTPUT"
            echo 'status_text=失败' >> "$GITHUB_OUTPUT"
            echo 'sync_eligible=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo 'overall=success' >> "$GITHUB_OUTPUT"
          echo 'status_icon=✅' >> "$GITHUB_OUTPUT"
          echo 'status_text=成功' >> "$GITHUB_OUTPUT"
          if [ "${IS_TAG_RELEASE}" = 'true' ]; then
            echo 'sync_eligible=true' >> "$GITHUB_OUTPUT"
          else
            echo 'sync_eligible=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Build platforms summary
        id: platforms
        if: always()
        shell: bash
        env:
          WINDOWS_STATUS: ${{ steps.status.outputs.windows_build_status }}
          PLATFORM_STATUS: ${{ steps.status.outputs.platform_build_status }}
        run: |
          platforms=()
          if [ "${WINDOWS_STATUS}" = 'success' ]; then
            platforms+=("Windows Portable")
            platforms+=("Windows NSIS")
            platforms+=("Windows AppX")
          fi
          if [ "${PLATFORM_STATUS}" = 'success' ]; then
            platforms+=("Linux AppImage")
            platforms+=("Linux tar.gz")
            platforms+=("Linux ZIP")
            platforms+=("macOS x64")
            platforms+=("macOS arm64")
          fi

          if [ ${#platforms[@]} -eq 0 ]; then
            platforms_str='无'
          else
            platforms_str=$(IFS=', '; echo "${platforms[*]}")
          fi

          echo "platforms=${platforms_str}" >> "$GITHUB_OUTPUT"

      - name: Publish workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Release orchestration summary'
            echo
            echo '- Version: ${{ needs.prepare-release.outputs.version }}'
            echo '- Release tag: ${{ needs.prepare-release.outputs.release_tag || '(none)' }}'
            echo '- Version source: ${{ needs.prepare-release.outputs.version_source }}'
            echo '- Release channel: ${{ needs.prepare-release.outputs.channel }}'
            echo '- Channel source: ${{ needs.prepare-release.outputs.channel_source }}'
            echo '- Windows build status: ${{ steps.status.outputs.windows_build_status }}'
            echo '- Non-Windows matrix build status: ${{ steps.status.outputs.platform_build_status }}'
            echo '- Windows publish status: ${{ steps.status.outputs.windows_publish_status }}'
            echo '- Non-Windows matrix publish status: ${{ steps.status.outputs.platform_publish_status }}'
            echo '- Normalized overall status: ${{ steps.status.outputs.overall }}'
            echo '- Azure sync eligible: ${{ steps.status.outputs.sync_eligible }}'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Feishu
        if: always()
        uses: HagiCode-org/haginotifier@v1.0.0
        with:
          message: |
            **Flow 执行完成**

            状态: ${{ steps.status.outputs.status_icon }} ${{ steps.status.outputs.status_text }}
            分支: ${{ github.ref_name }}
            提交: `${{ github.sha }}`
            触发者: ${{ github.actor }}
            事件: ${{ github.event_name }}
            构建平台: ${{ steps.platforms.outputs.platforms }}

            [查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          msg_type: 'post'
          title: 'Hagicode Desktop 构建通知 ${{ steps.status.outputs.status_icon }}'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

      - name: Fail workflow on normalized platform failure
        if: steps.status.outputs.overall != 'success'
        run: |
          echo '::error::One or more release build or upload jobs failed. Downstream publish is blocked.'
          exit 1

  sync-azure-upload:
    name: Upload Release Shards to Azure Storage
    needs:
      - prepare-release
      - build-summary
    if: ${{ always() && needs.build-summary.outputs.sync_eligible == 'true' && needs.build-summary.outputs.release_status == 'success' }}
    uses: ./.github/workflows/sync-azure-storage.yml
    with:
      release_tag: ${{ needs.prepare-release.outputs.release_tag }}
      release_channel: ${{ needs.build-summary.outputs.channel }}
    secrets: inherit

  sync-azure-finalize:
    name: Finalize Azure Storage Sync
    needs: sync-azure-upload
    if: ${{ always() && needs.sync-azure-upload.result == 'success' }}
    uses: ./.github/workflows/finalize-azure-storage.yml
    secrets: inherit
