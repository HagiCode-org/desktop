        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

  ################################################################################
  # Linux Build Job
  ################################################################################
  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine release channel
        id: channel
        run: |
          # If channel is manually specified, use it
          if [ -n "${{ github.event.inputs.channel }}" ]; then
            CHANNEL="${{ github.event.inputs.channel }}"
            echo "Using manually specified channel: ${CHANNEL}"
          else
            # Auto-detect channel based on tag or branch
            if [ "${{ github.ref_type }}" == "tag" ]; then
              TAG="${GITHUB_REF_NAME#v}"
              # Check if version contains pre-release identifiers
              if [[ "$TAG" =~ -(beta|alpha|rc|dev) ]]; then
                if [[ "$TAG" =~ -beta ]]; then
                  CHANNEL="beta"
                elif [[ "$TAG" =~ -alpha ]]; then
                  CHANNEL="dev"
                elif [[ "$TAG" =~ -rc ]]; then
                  CHANNEL="beta"
                elif [[ "$TAG" =~ -dev ]]; then
                  CHANNEL="dev"
                fi
              else
                # Stable version (no pre-release identifier)
                CHANNEL="stable"
              fi
            elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
              # Main branch without tag - use beta for testing
              CHANNEL="beta"
            else
              # Other branches
              CHANNEL="dev"
            fi
            echo "Auto-detected channel: ${CHANNEL}"
          fi

          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT
          echo "RELEASE_CHANNEL=${CHANNEL}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing npm/package.json version to ${VERSION}"
          npm version "${VERSION}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build for Linux
        run: node scripts/ci-build.js --platform linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload each artifact separately
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        if: success() && !startsWith(github.ref, 'refs/tags/v')
        with:
          name: hagicode-linux-appimage-${{ github.sha }}
          path: pkg/*.AppImage
          retention-days: 30
          if-no-files-found: warn

      - name: Upload AppImage to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: pkg/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload deb
        uses: actions/upload-artifact@v4
        if: success() && !startsWith(github.ref, 'refs/tags/v')
        with:
          name: hagicode-linux-deb-${{ github.sha }}
          path: pkg/*.deb
          retention-days: 30
          if-no-files-found: warn

      - name: Upload deb to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: pkg/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        if: success() && !startsWith(github.ref, 'refs/tags/v')
        with:
          name: hagicode-linux-targz-${{ github.sha }}
          path: pkg/*.tar.gz
          retention-days: 30
          if-no-files-found: warn

      - name: Upload tar.gz to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: pkg/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ################################################################################
  # macOS Build Job
  ################################################################################
  build-macos:
    name: Build for macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine release channel
        id: channel
        run: |
          # If channel is manually specified, use it
          if [ -n "${{ github.event.inputs.channel }}" ]; then
            CHANNEL="${{ github.event.inputs.channel }}"
            echo "Using manually specified channel: ${CHANNEL}"
          else
            # Auto-detect channel based on tag or branch
            if [ "${{ github.ref_type }}" == "tag" ]; then
              TAG="${GITHUB_REF_NAME#v}"
              # Check if version contains pre-release identifiers
              if [[ "$TAG" =~ -(beta|alpha|rc|dev) ]]; then
                if [[ "$TAG" =~ -beta ]]; then
                  CHANNEL="beta"
                elif [[ "$TAG" =~ -alpha ]]; then
                  CHANNEL="dev"
                elif [[ "$TAG" =~ -rc ]]; then
                  CHANNEL="beta"
                elif [[ "$TAG" =~ -dev ]]; then
                  CHANNEL="dev"
                fi
              else
                # Stable version (no pre-release identifier)
                CHANNEL="stable"
              fi
            elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
              # Main branch without tag - use beta for testing
              CHANNEL="beta"
            else
              # Other branches
              CHANNEL="dev"
            fi
            echo "Auto-detected channel: ${CHANNEL}"
          fi

          echo "channel=${CHANNEL}" >> $GITHUB_OUTPUT
          echo "RELEASE_CHANNEL=${CHANNEL}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing npm/package.json version to ${VERSION}"
          npm version "${VERSION}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build for macOS
        run: node scripts/ci-build.js --platform mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload each artifact separately
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        if: success() && !startsWith(github.ref, 'refs/tags/v')
        with:
          name: hagicode-macos-dmg-${{ github.sha }}
          path: pkg/*.dmg
          retention-days: 30
          if-no-files-found: warn

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: pkg/*.dmg
        env:
