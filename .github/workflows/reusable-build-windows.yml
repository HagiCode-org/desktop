name: Reusable Windows Package Build

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      channel:
        required: true
        type: string
      is_production_build:
        required: true
        type: boolean
      sign_windows_release:
        required: true
        type: boolean
      publish_release_assets:
        required: true
        type: boolean

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: '22'
  HAGISCRIPT_VERSION: 'latest'
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron

jobs:
  build-windows:
    name: Build Windows (${{ matrix.target.name }})
    runs-on: windows-2025-vs2026
    environment:
      name: ${{ inputs.is_production_build && 'production' || 'ci' }}
      deployment: false
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: portable
            name: Portable
            builder_target: portable
            report_suffix: portable
            requires_zip: true
            artifact_path: pkg/*.exe
          - id: nsis
            name: NSIS
            builder_target: nsis
            report_suffix: nsis
            requires_zip: false
            artifact_path: pkg/*Setup*.exe
          - id: msix
            name: MSIX
            report_suffix: store
            requires_zip: false
            artifact_path: pkg/*.msix
    permissions:
      contents: write
      id-token: write
    env:
      RELEASE_CHANNEL: ${{ inputs.channel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine Windows signing policy
        id: signing_policy
        shell: bash
        run: |
          if [[ "${{ inputs.is_production_build }}" == 'true' ]]; then
            required=true
            reason='production build'
          elif [[ "${{ inputs.sign_windows_release }}" == 'true' ]]; then
            required=true
            reason='manual workflow_dispatch override'
          else
            required=false
            reason='non-release build'
          fi

          echo "required=${required}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"
          echo "Windows signing required: ${required} (${reason})"

      - name: Validate Artifact Signing configuration
        if: success() && steps.signing_policy.outputs.required == 'true'
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CODESIGN_ENDPOINT: ${{ secrets.AZURE_CODESIGN_ENDPOINT }}
          AZURE_CODESIGN_ACCOUNT_NAME: ${{ secrets.AZURE_CODESIGN_ACCOUNT_NAME }}
          AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME }}
          WINDOWS_PACKAGE_PUBLISHER: ${{ secrets.WINDOWS_PACKAGE_PUBLISHER }}
        run: |
          missing=()

          for key in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_CODESIGN_ENDPOINT AZURE_CODESIGN_ACCOUNT_NAME AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME WINDOWS_PACKAGE_PUBLISHER; do
            if [ -z "${!key}" ]; then
              missing+=("${key}")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            printf '::error::Missing Artifact Signing configuration: %s\n' "$(IFS=', '; echo "${missing[*]}")"
            {
              echo '## Windows code signing configuration error'
              echo
              echo 'The release build requires Artifact Signing, but the following values are missing:'
              echo
              for key in "${missing[@]}"; do
                echo "- ${key}"
              done
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install global hagiscript
        shell: bash
        run: |
          npm install --global "@hagicode/hagiscript@${HAGISCRIPT_VERSION}"
          prefix="$(npm config get prefix)"
          echo "$prefix" >> "$GITHUB_PATH"
          if [ -d "$prefix/bin" ]; then
            echo "$prefix/bin" >> "$GITHUB_PATH"
          fi
          hash -r
          hagiscript --version

      - name: Cache build downloads
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            build/embedded-runtime/downloads
            build/embedded-node-runtime/downloads
            .generated/code-server-runtime/downloads
            .generated/omniroute-runtime/downloads
          key: ${{ runner.os }}-build-downloads-${{ hashFiles('package-lock.json', 'resources/manifest.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-downloads-

      - name: Sync package version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          echo "Syncing npm/package.json version to ${VERSION}"
          npm version "${VERSION}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Resolve Windows SDK for MSIX packaging
        if: success() && matrix.target.id == 'msix'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $windowsKitsRoot = Join-Path ${env:ProgramFiles(x86)} 'Windows Kits\10\bin'
          if (-not (Test-Path $windowsKitsRoot)) {
            throw "Windows Kits bin directory not found: $windowsKitsRoot"
          }

          $sdkDirectory = Get-ChildItem -Path $windowsKitsRoot -Directory |
            Where-Object {
              $_.Name -match '^\d+\.\d+\.\d+\.\d+$' -and
              (Test-Path (Join-Path $_.FullName 'x64\makeappx.exe')) -and
              (Test-Path (Join-Path $_.FullName 'x64\makepri.exe'))
            } |
            Sort-Object { [version] $_.Name } -Descending |
            Select-Object -First 1

          if (-not $sdkDirectory) {
            throw "No Windows SDK with makeappx.exe and makepri.exe was found under $windowsKitsRoot"
          }

          "WINDOWS_KIT_VERSION=$($sdkDirectory.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows ${{ matrix.target.name }} package
        if: matrix.target.id != 'msix'
        shell: bash
        run: node scripts/ci-build.js --platform win --target "${{ matrix.target.builder_target }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAGICODE_EMBEDDED_DOTNET_PLATFORM: win-x64
          HAGICODE_RUNTIME_CONSUMER: windows-store
          HAGICODE_RUNTIME_DEPENDENCY_MANAGEMENT_MODE: internal
          WINDOWS_PACKAGE_PUBLISHER: ${{ secrets.WINDOWS_PACKAGE_PUBLISHER }}

      - name: Build Windows MSIX Store package
        if: matrix.target.id == 'msix'
        shell: bash
        run: |
          npm run build:win:store -- \
            --artifact-output-dir pkg \
            --metadata-output-path pkg/store-build-metadata.json \
            --overlay-output-path forge.store-config.json \
            --platform-id win-x64
          npm run package:smoke-test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAGICODE_EMBEDDED_DOTNET_PLATFORM: win-x64
          HAGICODE_RUNTIME_CONSUMER: windows-store
          HAGICODE_RUNTIME_DEPENDENCY_MANAGEMENT_MODE: internal
          WINDOWS_PACKAGE_PUBLISHER: ${{ secrets.WINDOWS_PACKAGE_PUBLISHER }}

      - name: Preserve unsigned Windows artifacts
        if: success() && steps.signing_policy.outputs.required == 'true'
        shell: bash
        run: |
          set -euo pipefail
          node scripts/preserve-artifacts.js \
            --source-dir pkg \
            --artifact-path "${{ matrix.target.artifact_path }}" \
            --output-dir unsigned-artifacts \
            --suffix unsigned

      - name: Collect Windows ${{ matrix.target.name }} artifacts
        id: windows_artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pkgDir = Join-Path $env:GITHUB_WORKSPACE 'pkg'
          if (-not (Test-Path $pkgDir)) {
            throw "pkg directory not found: $pkgDir"
          }

          $allFiles = Get-ChildItem -Path $pkgDir -File
          $nsis = @($allFiles | Where-Object { $_.Extension -ieq '.exe' -and $_.Name -like '*Setup*' } | Sort-Object FullName -Unique)
          $portable = @($allFiles | Where-Object { $_.Extension -ieq '.exe' -and $_.Name -notlike '*Setup*' } | Sort-Object FullName -Unique)
          $msix = @($allFiles | Where-Object { $_.Extension -ieq '.msix' } | Sort-Object FullName -Unique)
          $selectedFiles = switch ('${{ matrix.target.id }}') {
            'portable' { $portable }
            'nsis' { $nsis }
            'msix' { $msix }
            default { @() }
          }
          $unpackedRoots = @(Get-ChildItem -Path $pkgDir -Directory | Where-Object { $_.Name -eq 'win-unpacked' } | Sort-Object FullName -Unique)
          $catalogPath = Join-Path $pkgDir 'windows-signable-artifacts.txt'
          $buildReport = switch ('${{ matrix.target.id }}') {
            'msix' { Join-Path $pkgDir 'store-build-metadata.json' }
            default { Join-Path $pkgDir 'ci-build-report-win-${{ matrix.target.report_suffix }}.json' }
          }

          if ($selectedFiles.Count -eq 0) {
            throw "No Windows ${{ matrix.target.name }} artifacts were found in pkg/."
          }

          if ('${{ matrix.target.id }}' -eq 'portable' -and $unpackedRoots.Count -eq 0) {
            throw 'No win-unpacked directory was found in pkg/ for ZIP assembly.'
          }

          if (-not (Test-Path $buildReport)) {
            throw "CI build report was not found: $buildReport"
          }

          $catalogEntries = @()
          foreach ($file in $selectedFiles) {
            $catalogEntries += [System.IO.Path]::GetRelativePath($pkgDir, $file.FullName).Replace([System.IO.Path]::DirectorySeparatorChar, '/')
          }
          $catalogEntries = @($catalogEntries | Sort-Object -Unique)
          $catalogEntries | Set-Content -Path $catalogPath

          $zipPayloadRoot = Join-Path $pkgDir 'windows-zip-payload'
          $zipBaseName = [System.IO.Path]::GetFileNameWithoutExtension($selectedFiles[0].Name)

          function Write-MultilineOutput([string]$Name, [object[]]$Files) {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "$Name<<EOF"
            foreach ($file in $Files) {
              Add-Content -Path $env:GITHUB_OUTPUT -Value $file.FullName
            }
            Add-Content -Path $env:GITHUB_OUTPUT -Value 'EOF'
          }

          Write-MultilineOutput 'package_files' $selectedFiles
          Write-MultilineOutput 'unpacked_roots' $unpackedRoots
          Add-Content -Path $env:GITHUB_OUTPUT -Value "catalog_path=$catalogPath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_payload_root=$zipPayloadRoot"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_base_name=$zipBaseName"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "package_count=$($selectedFiles.Count)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "unpacked_count=$($unpackedRoots.Count)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "report_path=$buildReport"

      - name: Prepare Windows unpacked ZIP payload workspace
        if: success() && matrix.target.requires_zip
        id: windows_zip_payload
        shell: pwsh
        env:
          WINDOWS_UNPACKED_ROOTS: ${{ steps.windows_artifacts.outputs.unpacked_roots }}
          WINDOWS_SIGNABLE_FILES: ${{ steps.windows_artifacts.outputs.package_files }}
          WINDOWS_ZIP_BASE_NAME: ${{ steps.windows_artifacts.outputs.zip_base_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $zipPayloadRoot = '${{ steps.windows_artifacts.outputs.zip_payload_root }}'
          $catalogPath = '${{ steps.windows_artifacts.outputs.catalog_path }}'
          $pkgDir = Split-Path -Path $catalogPath -Parent

          if (Test-Path $zipPayloadRoot) {
            Remove-Item -Path $zipPayloadRoot -Recurse -Force
          }
          New-Item -Path $zipPayloadRoot -ItemType Directory -Force | Out-Null

          $unpackedRoots = @()
          $env:WINDOWS_UNPACKED_ROOTS -split "`r?`n" | ForEach-Object {
            $trimmed = $_.Trim()
            if ($trimmed) {
              $unpackedRoots += $trimmed
            }
          }

          if ($unpackedRoots.Count -eq 0) {
            throw 'No unpacked Windows roots were passed to ZIP payload staging.'
          }

          $payloadDirName = "{0}-unpacked" -f $env:WINDOWS_ZIP_BASE_NAME
          $payloadDir = Join-Path $zipPayloadRoot $payloadDirName
          New-Item -Path $payloadDir -ItemType Directory -Force | Out-Null

          foreach ($unpackedRootPath in $unpackedRoots) {
            $unpackedRoot = Get-Item -LiteralPath $unpackedRootPath
            Get-ChildItem -LiteralPath $unpackedRoot.FullName -Force | ForEach-Object {
              $targetPath = Join-Path $payloadDir $_.Name
              if ($_.PSIsContainer) {
                Copy-Item -LiteralPath $_.FullName -Destination $targetPath -Recurse -Force
              } else {
                Copy-Item -LiteralPath $_.FullName -Destination $targetPath -Force
              }
            }
          }

          $zipPayloadFiles = @(Get-ChildItem -LiteralPath $payloadDir -Recurse -File | Sort-Object FullName)
          if ($zipPayloadFiles.Count -eq 0) {
            throw 'Windows ZIP payload staging did not produce any files.'
          }

          $signableFiles = @()
          $env:WINDOWS_SIGNABLE_FILES -split "`r?`n" | ForEach-Object {
            $trimmed = $_.Trim()
            if ($trimmed) {
              $signableFiles += $trimmed
            }
          }

          $zipPayloadRootExecutables = @(
            $zipPayloadFiles | Where-Object {
              $_.Extension -ieq '.exe' -and
              $_.DirectoryName -eq $payloadDir
            } | Sort-Object FullName -Unique
          )

          if ($zipPayloadRootExecutables.Count -ne 1) {
            $detectedExecutables = if ($zipPayloadRootExecutables.Count -gt 0) {
              ($zipPayloadRootExecutables | ForEach-Object { $_.FullName }) -join [Environment]::NewLine
            } else {
              '(none)'
            }
            throw "Expected exactly one root desktop executable in ZIP payload staging, found $($zipPayloadRootExecutables.Count):`n$detectedExecutables"
          }

          $catalogEntries = @()
          foreach ($filePath in @($signableFiles + ($zipPayloadRootExecutables | ForEach-Object { $_.FullName }))) {
            $resolvedPath = Resolve-Path -LiteralPath $filePath | Select-Object -ExpandProperty Path
            $catalogEntries += [System.IO.Path]::GetRelativePath($pkgDir, $resolvedPath).Replace([System.IO.Path]::DirectorySeparatorChar, '/')
          }
          $catalogEntries = @($catalogEntries | Sort-Object -Unique)
          $catalogEntries | Set-Content -Path $catalogPath

          Add-Content -Path $env:GITHUB_OUTPUT -Value "payload_dir=$payloadDir"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "payload_dir_name=$payloadDirName"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_payload_count=$($zipPayloadFiles.Count)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_payload_signable_count=$($zipPayloadRootExecutables.Count)"

      - name: Azure login for Artifact Signing
        if: success() && steps.signing_policy.outputs.required == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows artifacts with Artifact Signing
        if: success() && steps.signing_policy.outputs.required == 'true'
        id: windows_signing
        continue-on-error: ${{ matrix.target.id == 'msix' }}
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ secrets.AZURE_CODESIGN_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_CODESIGN_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CODESIGN_CERTIFICATE_PROFILE_NAME }}
          files-catalog: ${{ steps.windows_artifacts.outputs.catalog_path }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          cache-dependencies: true

      - name: Summarize unsigned MSIX fallback
        if: always() && steps.signing_policy.outputs.required == 'true' && matrix.target.id == 'msix' && steps.windows_signing.outcome != 'success'
        shell: pwsh
        run: |
          $summary = @(
            '## Windows MSIX signing skipped',
            '',
            '- Azure Artifact Signing v2 for MSIX did not complete successfully on this run.',
            '- The signed `MSIX` artifact was skipped.',
            '- The unsigned MSIX artifact is still available with the `-unsigned` suffix.'
          ) -join "`n"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
          Write-Warning 'MSIX signing failed; skipping signed artifact upload and retaining only the unsigned MSIX artifact.'

      - name: Verify Windows signatures
        if: success() && steps.signing_policy.outputs.required == 'true' && matrix.target.id != 'msix'
        shell: bash
        env:
          VERIFY_STRICT: 'true'
        run: |
          node scripts/verify-signature.js --catalog "${{ steps.windows_artifacts.outputs.catalog_path }}"

      - name: Create Windows ZIP artifact
        if: success() && matrix.target.requires_zip
        id: windows_zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $pkgDir = Join-Path $env:GITHUB_WORKSPACE 'pkg'
          $payloadDir = '${{ steps.windows_zip_payload.outputs.payload_dir }}'
          $payloadDirName = '${{ steps.windows_zip_payload.outputs.payload_dir_name }}'
          if (-not (Test-Path $payloadDir)) {
            throw "Windows ZIP payload directory not found: $payloadDir"
          }

          $zipPath = Join-Path $pkgDir ("{0}.zip" -f $payloadDirName)
          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $payloadDir '*') -DestinationPath $zipPath -CompressionLevel Optimal
          $zipFile = Get-Item -LiteralPath $zipPath

          Add-Content -Path $env:GITHUB_OUTPUT -Value 'zip_files<<EOF'
          Add-Content -Path $env:GITHUB_OUTPUT -Value $zipFile.FullName
          Add-Content -Path $env:GITHUB_OUTPUT -Value 'EOF'
          Add-Content -Path $env:GITHUB_OUTPUT -Value "zip_path=$($zipFile.FullName)"
          Add-Content -Path $env:GITHUB_OUTPUT -Value 'zip_count=1'

      - name: Verify Windows ZIP toolchain payload
        if: success() && matrix.target.requires_zip && steps.windows_zip.outputs.zip_path != ''
        shell: bash
        env:
          HAGICODE_RUNTIME_CONSUMER: windows-store
          HAGICODE_RUNTIME_DEPENDENCY_MANAGEMENT_MODE: internal
        run: |
          node scripts/verify-release-archives.js --archive "${{ steps.windows_zip.outputs.zip_path }}"

      - name: Summarize Windows package build
        if: success()
        shell: bash
        run: |
          {
            echo '## Windows package build'
            echo
            echo '- Package target: ${{ matrix.target.name }}'
            echo '- Version: ${{ inputs.version }}'
            echo '- Release channel: ${{ inputs.channel }}'
            echo "- Signing policy: ${{ steps.signing_policy.outputs.reason }}"
            echo '- Package artifacts discovered: ${{ steps.windows_artifacts.outputs.package_count }}'
            echo '- Unpacked roots discovered: ${{ steps.windows_artifacts.outputs.unpacked_count }}'
            echo '- ZIP payload files staged: ${{ steps.windows_zip_payload.outputs.zip_payload_count }}'
            echo '- ZIP artifacts created: ${{ steps.windows_zip.outputs.zip_count }}'
            echo '- CI build report: `${{ steps.windows_artifacts.outputs.report_path }}`'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Windows release bundle
        uses: actions/upload-artifact@v4
        if: success() && inputs.publish_release_assets && (steps.signing_policy.outputs.required != 'true' || matrix.target.id != 'msix' || steps.windows_signing.outcome == 'success')
        with:
          name: release-windows-${{ matrix.target.id }}-assets
          path: |
            ${{ steps.windows_artifacts.outputs.package_files }}
            ${{ steps.windows_zip.outputs.zip_files }}
            unsigned-artifacts/*
            ${{ steps.windows_artifacts.outputs.report_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload Windows build bundle
        uses: actions/upload-artifact@v4
        if: success() && !inputs.publish_release_assets && (steps.signing_policy.outputs.required != 'true' || matrix.target.id != 'msix' || steps.windows_signing.outcome == 'success')
        with:
          name: hagicode-windows-${{ matrix.target.id }}-${{ github.sha }}
          path: |
            ${{ steps.windows_artifacts.outputs.package_files }}
            ${{ steps.windows_zip.outputs.zip_files }}
            unsigned-artifacts/*
            ${{ steps.windows_artifacts.outputs.report_path }}
          retention-days: 30
          if-no-files-found: error

      - name: Code signing failure notification
        if: failure()
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:FEISHU_WEBHOOK_URL)) {
            Write-Host 'FEISHU_WEBHOOK_URL is empty, skipping Windows code signing failure notification.'
            exit 0
          }

          $message = @(
            '代码签名失败 (Windows) ❌',
            '',
            '平台: Windows / ${{ matrix.target.name }}',
            '版本: ${{ inputs.version }}',
            '提交: ${{ github.sha }}',
            '',
            '请检查签名配置和证书状态。',
            '可能的原因：',
            '- GitHub OIDC 到 Azure 的联邦身份或角色配置不完整',
            '- Artifact Signing 端点、签名账户或证书配置文件配置错误',
            '- 产物签名成功但验签失败',
            '',
            '查看详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          ) -join "`n"

          $payload = @{
            msg_type = 'text'
            content = @{
              text = $message
            }
          } | ConvertTo-Json -Depth 4

          Invoke-RestMethod -Method Post -Uri $env:FEISHU_WEBHOOK_URL -ContentType 'application/json' -Body $payload | Out-Null
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
