appId: com.newbe36524.hagicode
productName: Hagicode Desktop
directories:
  buildResources: resources
  output: pkg
files:
  - dist/**/*
  - resources/**/*
  - '!resources/bin/**/*'
  - '!resources/components/**/*'
  - '!pkg/**/*'
  - package.json
asar: true
asarUnpack:
  - '**/node_modules/**/{*.node,dll/*.dll,*.dylib}'
  - '**/vendor/**'
extraResources:
  - from: resources/icon.png
    to: icon.png
  - from: resources
    to: extra/runtime
    filter:
      - bin/**/*
      - components/**/*
  - from: resources/portable-fixed/current
    to: extra/portable-fixed/current
    filter:
      - '**/*'
      - '!**/.gitkeep'
publish:
  provider: github
  owner: HagiCode-org
  repo: desktop
afterPack: scripts/macos-toolchain-signing-hook.cjs
afterSign: scripts/macos-toolchain-signing-hook.cjs
win:
  target:
    - portable
    - nsis
  icon: resources/icon.ico
nsis:
  runAfterFinish: false
mac:
  target:
    - target: default
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
  category: public.app-category.utilities
  signIgnore:
    - Contents/Resources/extra/runtime/.*
linux:
  extraFiles:
    - from: resources/linux/hagicode-steam-wrapper.sh
      to: hagicode-steam-wrapper.sh
    - from: resources/linux/hagicode-steam-sandbox.sh
      to: hagicode-steam-sandbox.sh
  target:
    # Keep the currently supported Linux release formats and add ZIP for extractable distribution.
    - AppImage
    - tar.gz
    - zip
  category: Utility
  maintainer: newbe36524 <support@hagicode.com>
