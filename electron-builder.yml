appId: com.newbe36524.hagicode
productName: Hagicode Desktop
directories:
  output: pkg
files:
  - dist/**/*
  - resources/**/*
  - '!pkg/**/*'
  - package.json
asar: true
asarUnpack:
  - '**/node_modules/**/{*.node,dll/*.dll,*.dylib}'
  - '**/vendor/**'
extraResources:
  - from: resources/icon.png
    to: icon.png
  - from: build/embedded-runtime/current/dotnet
    to: dotnet
  - from: resources/portable-fixed/current
    to: extra/portable-fixed/current
    filter:
      - '**/*'
  - from: resources/portable-fixed/toolchain
    to: extra/portable-fixed/toolchain
    filter:
      - '**/*'
publish:
  provider: github
  owner: HagiCode-org
  repo: desktop
afterPack: scripts/macos-toolchain-signing-hook.cjs
afterSign: scripts/macos-toolchain-signing-hook.cjs
win:
  target:
    - portable
    - nsis
    - appx
  icon: resources/icon.ico
appx:
  displayName: Hagicode Desktop
  publisherDisplayName: newbe36524
  publisher: CN=8B6C8A94-AAE5-4C8B-9202-A29EA42B042F
  identityName: newbe36524.HagicodeDesktop
  backgroundColor: transparent
  languages:
    - en-US
    - zh-CN
  addAutoLaunchExtension: true
mac:
  target:
    - target: default
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
  category: public.app-category.utilities
  signIgnore:
    - Contents/Resources/extra/portable-fixed/toolchain/.*
linux:
  target:
    # Keep the currently supported Linux release formats and add ZIP for extractable distribution.
    - AppImage
    - tar.gz
    - zip
  category: Utility
  maintainer: newbe36524 <support@hagicode.com>
